<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>PRISMA · by GL Strategic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#0a0e14; --surface:#0f1419; --panel:#131c2a; --card:#1a2332;
  --border:#2a3d52; --text:#e0e8f0; --muted:#8fa3b8;
  --teal:#06d6a0; --gold:#f1c40f; --blue:#3498db; --red:#ee5a6f; --warn:#f39c12;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.4rem 1.2rem;min-height:52px;display:flex;align-items:center;gap:.8rem;flex-shrink:0;flex-wrap:wrap}
.brand{font-weight:800;font-size:.95rem;color:var(--teal);white-space:nowrap}
.brand span{color:var(--gold)}
.topbar select,input[type=file],button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.35rem .7rem;border-radius:6px;font-size:.78rem;cursor:pointer}
.topbar button{background:var(--teal);color:#000;font-weight:700;border:none}
.topbar button.secondary{background:transparent;color:var(--teal);border:1px solid var(--teal)}
.separator{width:1px;height:20px;background:var(--border);margin:0 .2rem}
.company-badge{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.25);border-radius:8px;padding:.25rem .7rem;font-size:.72rem;color:var(--teal);font-weight:600}
/* ── MAIN ── */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:310px;background:var(--panel);border-right:1px solid var(--border);padding:.8rem;overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:.8rem;overflow-y:auto}
/* ── SLIDERS ── */
.palanca{margin-bottom:.7rem}
.palanca label{display:flex;justify-content:space-between;font-size:.73rem;font-weight:600;color:var(--muted)}
.palanca input{width:100%;margin-top:.15rem}
.palanca .range-labels{display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted)}
/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-bottom:.8rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem}
.kpi-card .label{font-size:.62rem;color:var(--muted);text-transform:uppercase}
.kpi-card .value{font-size:1.3rem;font-weight:800;margin:.15rem 0;line-height:1}
.kpi-card .value.gold{color:var(--gold)} .kpi-card .value.teal{color:var(--teal)}
.kpi-card .value.red{color:var(--red)} .kpi-card .value.blue{color:var(--blue)}
.kpi-card .sub{font-size:.58rem;color:var(--muted)}
/* ── TABS ── */
.tabs{display:flex;gap:.35rem;margin-bottom:.8rem}
.tab{padding:.35rem .8rem;border-radius:6px;cursor:pointer;font-size:.73rem;background:var(--panel);border:1px solid var(--border);color:var(--muted);transition:all .2s}
.tab.active{background:var(--teal);color:#000;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
/* ── CHARTS ── */
canvas{max-height:260px;margin-top:.4rem}
/* ── BOARDROOM ── */
.cascade-row{display:flex;align-items:center;gap:.4rem;margin:.25rem 0;font-size:.7rem}
.cascade-bar{height:18px;border-radius:4px;display:inline-block;min-width:18px}
.cascade-bar.pos{background:var(--teal)} .cascade-bar.neg{background:var(--red)}
/* ── CADENAS ── */
.chain-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:6px;padding:.6rem;margin-bottom:.4rem;font-size:.72rem}
.chain-card.neg{border-left-color:var(--red)}
.chain-card .chain-title{font-weight:700;margin-bottom:.2rem}
.chain-card .chain-desc{color:var(--muted);line-height:1.4;font-size:.68rem}
.chain-card .chain-impact{font-size:.65rem;margin-top:.25rem;font-weight:600}
/* ── ALERTS ── */
.alert-banner{padding:.4rem .7rem;border-radius:6px;margin:.35rem 0;font-size:.7rem;background:rgba(238,90,111,.1);border:1px solid rgba(238,90,111,.3);color:var(--red)}
.alert-banner.ok{background:rgba(6,214,160,.1);border-color:rgba(6,214,160,.3);color:var(--teal)}
.btn-row{display:flex;gap:.4rem;flex-wrap:wrap;margin:.4rem 0}
/* ── GRAFO ── */
.grafo-svg-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem;margin-top:.5rem;overflow:auto}
.grafo-svg-container svg{width:100%;min-height:350px}
.node-rect{fill:#1a2332;stroke-width:2;rx:4}
.node-text{font-size:9px;fill:#e0e8f0;font-weight:600;text-anchor:middle}
.node-label{font-size:7px;fill:#8fa3b8;text-anchor:middle}
.edge-line{stroke-width:2;fill:none;opacity:0.8}
.edge-pos{stroke:#06d6a0} .edge-neg{stroke:#ee5a6f}
/* ── SEMÁFORO ── */
.semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.semaforo.verde{background:#06d6a0;box-shadow:0 0 6px #06d6a0}
.semaforo.amarillo{background:#f39c12;box-shadow:0 0 6px #f39c12}
.semaforo.rojo{background:#ee5a6f;box-shadow:0 0 6px #ee5a6f}
/* ── SUPUESTOS ── */
.supuestos-table{width:100%;border-collapse:collapse;font-size:.7rem;margin-top:.5rem}
.supuestos-table td,.supuestos-table th{padding:.3rem .5rem;border:1px solid var(--border)}
.supuestos-table td input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.15rem .3rem;border-radius:4px;font-size:.7rem}
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.2rem;width:90%;max-width:400px}
.modal-box h3{color:var(--gold);margin-bottom:.6rem;font-size:.85rem}
.modal-box input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.4rem;border-radius:6px;margin-bottom:.6rem}
.modal-box .btn-row{justify-content:flex-end}
.saved-scenario{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;margin-bottom:.3rem;display:flex;justify-content:space-between;align-items:center;font-size:.73rem;cursor:pointer}
.saved-scenario:hover{border-color:var(--teal)}
/* ── PROYECCIÓN ── */
.proyeccion-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem}
.proyeccion-controls label{font-size:.73rem;color:var(--muted)}
.proyeccion-controls input{width:120px}
.calibracion-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin-bottom:.8rem}
.calibracion-box .result{font-family:monospace;font-size:.73rem;color:var(--teal);margin-top:.5rem;white-space:pre-wrap}
/* ── RESPONSIVE ── */
@media(max-width:900px){.sidebar{width:100%;max-height:35vh}.main{flex-direction:column}}
@media print{body{background:#fff;color:#000}.sidebar,.topbar{display:none}.content{overflow:visible}}
body.presentation .topbar{display:none}
body.presentation .sidebar{display:none}
body.presentation .tabs{display:none}
body.presentation .kpi-card{padding:1.5rem}
body.presentation .kpi-card .value{font-size:2.2rem}
body.presentation .kpi-card .label{font-size:.85rem}
body.presentation .kpi-grid{grid-template-columns:repeat(4,1fr);gap:1.2rem}
body.presentation .content{padding:2rem;background:var(--bg)}
</style>
</head>

  </div>
</div>

function obtenerFormula(ind) {
  if (typeof ind.formulaPrincipal === 'function') return ind.formulaPrincipal;
  if (typeof ind.formulaPrincipal === 'string') {
    try { return eval('(' + ind.formulaPrincipal + ')'); }
    catch(e) { console.error(e); return () => ({}); }
  }
  return () => ({});
}

function simular(palancas) {
  if (!industriaActual) return {};
  const formula = obtenerFormula(industriaActual);
  const sup = {...(industriaActual.supuestos||{}), ...perfilCliente};
  try { return formula(palancas, sup, CTX); }
  catch(e) { console.error(e); return {}; }
}

function leerPalancas() {
  if (!industriaActual) return {};
  const p = {};
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const slider = document.getElementById('sl-'+n.id);
    p[n.id] = slider ? parseFloat(slider.value) : (industriaActual.initState[n.id]||0);
  });
  return p;
}

function actualizar() {
  const palancas = leerPalancas();
  estadoActual = simular(palancas);
  if (Object.keys(perfilClienteB).length > 0) {
    const formula = obtenerFormula(industriaActual);
    const supB = {...(industriaActual.supuestos||{}), ...perfilClienteB};
    try { estadoB = formula(palancas, supB, CTX); } catch(e) { estadoB = null; }
  } else { estadoB = null; }
  renderKPIs(); renderBoardroom(); renderCadenas();
}

function construirSidebar() {
  if (!industriaActual) return;
  const container = document.getElementById('palancasContainer');
  container.innerHTML = '';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const init = industriaActual.initState[n.id]||0;
    const inc = (industriaActual.incertidumbre||{})[n.id]||{};
    const min = inc.min!==undefined ? inc.min : 0;
    const max = inc.max!==undefined ? inc.max : init*2;
    const div = document.createElement('div'); div.className='palanca';
    div.innerHTML=`<label><span>${n.label}</span><span id="val-${n.id}" style="font-size:.7rem;color:var(--teal)">${init}</span></label>
      <input type="range" id="sl-${n.id}" min="${min}" max="${max}" value="${init}" step="${(max-min)/200}">
      <div class="range-labels"><span>${min}</span><span>${max}</span></div>`;
    container.appendChild(div);
    document.getElementById('sl-'+n.id).addEventListener('input', ()=>{
      const s=document.getElementById('sl-'+n.id), v=document.getElementById('val-'+n.id);
      if(s&&v) v.textContent=parseFloat(s.value).toFixed(2);
      actualizar();
    });
  });
  // Escenarios
  const sel=document.getElementById('scenarioSelect');
  sel.innerHTML='<option value="">— Personalizado —</option>';
  (industriaActual.escenarios||[]).forEach((esc,i)=>{
    const opt=document.createElement('option'); opt.value=i; opt.textContent=esc.nombre; sel.appendChild(opt);
  });
}

function poblarEmpresas() {
  const key = document.getElementById('industrySelect').value;
  const sel = document.getElementById('companySelect');
  sel.innerHTML = '';
  const companies = COMPANIES[key]||[];
  companies.forEach(c=>sel.appendChild(new Option(c.nombre, c.id)));
  const selB = document.getElementById('companySelectB');
  selB.innerHTML = '<option value="">— Sin comparar —</option>';
  companies.forEach(c=>selB.appendChild(new Option(c.nombre, c.id)));
  if (companies.length>0) cargarEmpresa(companies[0].id);
}

function cargarEmpresa(id) {
  const key = document.getElementById('industrySelect').value;
  const company = (COMPANIES[key]||[]).find(c=>c.id===id);
  if (!company) return;
  if (EMBEDDED_INDUSTRIES[key]) {
    const ind = JSON.parse(JSON.stringify(EMBEDDED_INDUSTRIES[key]));
    if (typeof ind.formulaPrincipal==='string') ind.formulaPrincipal=eval('('+ind.formulaPrincipal+')');
    industriaActual = ind;
  }
  perfilCliente = {...(company.perfil||{})};
  document.getElementById('empresaBadge').textContent=company.nombre;
  document.getElementById('empresaBadge').style.display='inline-block';
  construirSidebar();
  Object.entries(company.perfil||{}).forEach(([k,v])=>{
    const sl=document.getElementById('sl-'+k), vl=document.getElementById('val-'+k);
    if(sl){sl.value=v; if(vl)vl.textContent=v;}
  });
  actualizar();
}

function cargarEmpresaB(id) {
  if (!id) { perfilClienteB={}; estadoB=null; actualizar(); return; }
  const key = document.getElementById('industrySelect').value;
  const company = (COMPANIES[key]||[]).find(c=>c.id===id);
  if (!company) return;
  perfilClienteB = {...(company.perfil||{})};
  actualizar();
}

function loadScenario(idx) {
  if (!industriaActual||idx==='') return;
  const esc = industriaActual.escenarios[parseInt(idx)];
  if (!esc) return;
  Object.entries(esc.palancas).forEach(([id,val])=>{
    const sl=document.getElementById('sl-'+id), vl=document.getElementById('val-'+id);
    if(sl){sl.value=val; if(vl)vl.textContent=val;}
  });
  actualizar();
}

function resetSliders() {
  if (!industriaActual) return;
  Object.entries(industriaActual.initState||{}).forEach(([id,val])=>{
    const sl=document.getElementById('sl-'+id), vl=document.getElementById('val-'+id);
    if(sl){sl.value=val; if(vl)vl.textContent=val;}
  });
  actualizar();
}

function renderKPIs() {
  const container = document.getElementById('kpiContainer');
  if (!industriaActual) return container.innerHTML='';
  container.innerHTML='';
  (industriaActual.kpis||[]).forEach(kpi=>{
    const val = estadoActual[kpi.id]!==undefined ? estadoActual[kpi.id] : 0;
    let f, fB='';
    if (kpi.formato==='dinero') f='$'+Number(val).toFixed(1)+'M';
    else if (kpi.formato==='porcentaje') f=Number(val).toFixed(1)+'%';
    else f=Number.isInteger(val)?val:Number(val).toFixed(2);
    if (estadoB && estadoB[kpi.id]!==undefined) {
      const valB=estadoB[kpi.id];
      if (kpi.formato==='dinero') fB='$'+Number(valB).toFixed(1)+'M';
      else fB=Number(valB).toFixed(2);
    }
    let semaforo='';
    const base=kpi.base||0;
    if (base>0) {
      const pct=(val-base)/Math.abs(base)*100;
      if (pct<-15) semaforo='<span class="semaforo rojo"></span>';
      else if (pct<-5) semaforo='<span class="semaforo amarillo"></span>';
      else semaforo='<span class="semaforo verde"></span>';
    }
    const color=kpi.id.includes('ebitda')||kpi.id.includes('margen')?'gold':kpi.id.includes('costo')||kpi.id.includes('deficit')?'red':'teal';
    const card=document.createElement('div'); card.className='kpi-card';
    card.innerHTML=`<div class="label">${semaforo}${kpi.label}</div><div class="value ${color}">${f}</div>${fB?`<div style="font-size:.65rem;color:var(--blue)">vs ${fB}</div>`:''}<div class="sub">${kpi.unidades}</div>`;
    container.appendChild(card);
  });
  // Gráfico principal
  if (chartInst) chartInst.destroy();
  const canvas=document.getElementById('impactChart');
  if (!canvas) return;
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato!=='info');
  chartInst=new Chart(canvas.getContext('2d'),{
    type:'bar',data:{labels:kpisNum.map(k=>k.label),datasets:[{data:kpisNum.map(k=>estadoActual[k.id]||0),backgroundColor:kpisNum.map(k=>k.id.includes('ebitda')||k.id.includes('margen')?'#06d6a0':'#3498db'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#8fa3b8'}},x:{ticks:{color:'#8fa3b8',font:{size:10}}}}}
  });
}

function renderBoardroom() {
  const container=document.getElementById('boardroomContent');
  if (!industriaActual||!estadoActual) return;
  const anclado=estadoAnclado||{};
  let html='<h3 style="color:var(--gold);margin-bottom:.6rem">📈 Cascada de Impacto</h3>';
  (industriaActual.kpis||[]).filter(k=>k.formato!=='info'&&estadoActual[k.id]!==undefined).forEach(kpi=>{
    const va=estadoActual[kpi.id]||0, vb=anclado[kpi.id]||0, d=va-vb;
    const ds=d>=0?'+'+d.toFixed(2):d.toFixed(2), w=Math.min(200,Math.abs(d)/(Math.abs(vb)||1)*200);
    html+=`<div class="cascade-row"><span style="width:110px">${kpi.label}</span><span class="cascade-bar ${d>=0?'pos':'neg'}" style="width:${Math.max(20,w)}px"></span><span style="font-weight:700;color:${d>=0?'var(--teal)':'var(--red)'}">${ds} ${kpi.unidades}</span></div>`;
  });
  container.innerHTML=html;
}

function renderCadenas() {
  const container=document.getElementById('cadenasContent');
  if (!industriaActual) return;
  let html='<h3 style="color:var(--gold);margin-bottom:.6rem">⛓️ Cadenas Causales</h3>';
  (industriaActual.cadenas||[]).forEach(c=>{
    const color=c.polaridad==='positivo'?'var(--teal)':'var(--red)';
    html+=`<div class="chain-card ${c.polaridad==='negativo'?'neg':''}"><div class="chain-title" style="color:${color}">${c.nombre}</div><div class="chain-desc">${c.descripcion}</div><div class="chain-impact" style="color:${color}">${c.impacto}</div></div>`;
  });
  container.innerHTML=html||'<p style="color:var(--muted)">Sin cadenas definidas.</p>';
}

function renderGrafo() {
  const container=document.getElementById('grafoContainer');
  if (!industriaActual||!industriaActual.nodos){container.innerHTML='';return;}
  const nodos=industriaActual.nodos;
  const arcos=industriaActual.arcos||[];
  const colX={driver:80,intermedio:350,resultado:620};
  let svg=`<svg viewBox="0 0 800 400"><defs><marker id="arrowPos" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#06d6a0"/></marker><marker id="arrowNeg" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ee5a6f"/></marker></defs>`;
  const pos={};
  ['driver','intermedio','resultado'].forEach(tipo=>{
    const arr=nodos.filter(n=>n.tipo===tipo);
    arr.forEach((n,i)=>{
      const y=60+i*65, x=colX[tipo];
      pos[n.id]={x:x+60,y:y+20};
      const color=tipo==='driver'?'#3498db':tipo==='intermedio'?'#f39c12':'#f1c40f';
      svg+=`<rect x="${x}" y="${y}" width="120" height="40" fill="#1a2332" stroke="${color}" stroke-width="2" rx="4"/><text x="${x+60}" y="${y+18}" font-size="9" fill="#e0e8f0" font-weight="600" text-anchor="middle">${n.label}</text><text x="${x+60}" y="${y+32}" font-size="7" fill="#8fa3b8" text-anchor="middle">${n.unidades}</text>`;
    });
  });
  arcos.forEach(a=>{
    const o=pos[a.origen], d=pos[a.destino];
    if (!o||!d) return;
    const marker=a.polaridad==='positivo'?'url(#arrowPos)':'url(#arrowNeg)';
    const color=a.polaridad==='positivo'?'#06d6a0':'#ee5a6f';
    const mx=(o.x+d.x)/2;
    svg+=`<path d="M${o.x},${o.y} C${mx},${o.y} ${mx},${d.y} ${d.x},${d.y}" stroke="${color}" stroke-width="2" fill="none" marker-end="${marker}" opacity="0.7"/>`;
  });
  svg+=`</svg>`;
  container.innerHTML=svg;
}

function runMontecarlo() {
  if (!industriaActual) return alert('Cargue una industria');
  const inc=industriaActual.incertidumbre||{};
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const resultados=[];
  for (let i=0;i<300;i++) {
    const pal={};
    drivers.forEach(n=>{
      const base=parseFloat(document.getElementById('sl-'+n.id)?.value)||industriaActual.initState[n.id]||0;
      const r=inc[n.id]||{}; const min=r.min!==undefined?r.min:base*0.6, max=r.max!==undefined?r.max:base*1.4;
      pal[n.id]=min+Math.random()*(max-min);
    });
    const res=simular(pal);
    const kr=(industriaActual.kpis||[]).filter(k=>k.id.includes('ebitda')||k.id.includes('margen')||k.id.includes('deficit'));
    if (kr.length) resultados.push(res[kr[0].id]||0);
  }
  if (!resultados.length) return;
  const bins={};resultados.forEach(v=>{const k=Math.round(v);bins[k]=(bins[k]||0)+1;});
  const labels=Object.keys(bins).sort((a,b)=>a-b),data=labels.map(l=>bins[l]);
  if (chartInst) chartInst.destroy();
  const canvas=document.getElementById('impactChart');
  chartInst=new Chart(canvas.getContext('2d'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#06d6a0',borderRadius:2}]},
    options:{responsive:true,plugins:{title:{display:true,text:'Montecarlo (300 sim)',color:'#e0e8f0'},legend:{display:false}}}});
  const suma=resultados.reduce((a,b)=>a+b,0),media=suma/resultados.length;
  const sorted=[...resultados].sort((a,b)=>a-b);
  const d=document.createElement('div');d.className='alert-banner ok';
  d.innerHTML=`📊 Media=${media.toFixed(2)} | P5=${sorted[Math.floor(300*.05)].toFixed(2)} | P95=${sorted[Math.floor(300*.95)].toFixed(2)}`;
  const kc=document.getElementById('kpiContainer');kc.insertBefore(d,kc.firstChild);
}

function actualizarProyeccion() {
  if (!industriaActual) return;
  const meses=parseInt(document.getElementById('mesesProy').value)||12;
  const palBase=leerPalancas();
  const supBase={...(industriaActual.supuestos||{}),...perfilCliente};
  const formula=obtenerFormula(industriaActual);
  const proy=[];
  for (let m=0;m<=meses;m++) {
    const pal={};
    Object.entries(palBase).forEach(([k,v])=>{
      const nodo=(industriaActual.nodos||[]).find(n=>n.id===k);
      const elast=nodo?nodo.elasticidad:0;
      pal[k]=v*(1+elast*0.005*m);
    });
    try { proy.push(formula(pal,supBase,CTX)); } catch(e) { proy.push({}); }
  }
  const kpiPrincipal=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen')||k.id.includes('deficit'));
  if (!kpiPrincipal) return;
  const labels=Array.from({length:meses+1},(_,i)=>'M'+(i+1));
  const data=proy.map(p=>p[kpiPrincipal.id]||0);
  const canvas=document.getElementById('proyeccionChart');
  if (!canvas) return;
  if (proyeccionChart) proyeccionChart.destroy();
  proyeccionChart=new Chart(canvas.getContext('2d'),{type:'line',data:{labels,datasets:[{label:kpiPrincipal.label+' proyectado',data,borderColor:'#f1c40f',backgroundColor:'rgba(241,196,15,.08)',fill:true,tension:.3,pointRadius:2}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{title:{display:true,text:`Proyección a ${meses} meses`,color:'#e0e8f0'}},scales:{y:{ticks:{color:'#8fa3b8'}},x:{ticks:{color:'#8fa3b8'}}}}});
}

function calibrarDesdeCSV() {
  const file=document.getElementById('csvCalibrar').files[0];
  if (!file) return alert('Seleccione un CSV');
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split(/\r?\n/);
    if (lines.length<2) return alert('CSV muy corto');
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
    const rows=lines.slice(1).map(line=>{const vals=line.split(',');const o={};headers.forEach((h,i)=>o[h]=parseFloat(vals[i]));return o;}).filter(r=>!isNaN(Object.values(r)[0]));
    if (rows.length<3) return alert('Se necesitan al menos 3 filas');
    const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
    const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen')||k.id.includes('deficit'));
    if (!kpiRes) return alert('No se encontró KPI resultado');
    let res='📊 Calibración:\n\n';
    drivers.forEach(driver=>{
      const x=rows.map(r=>r[driver.id]).filter(v=>!isNaN(v));
      const y=rows.map(r=>r[kpiRes.id]).filter(v=>!isNaN(v));
      if (x.length<3||y.length<3) return;
      const n=Math.min(x.length,y.length);
      let sx=0,sy=0,sxy=0,sx2=0;
      for(let i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];}
      const pend=(n*sxy-sx*sy)/(n*sx2-sx*sx);
      const mx=sx/n,my=sy/n;
      const elastReal=mx>0&&my>0?(pend*mx/my):0;
      const elastAct=driver.elasticidad||0;
      const diff=elastReal-elastAct;
      res+=`${Math.abs(diff)>.3?'⚠️':'✅'} ${driver.label}: act. ${elastAct.toFixed(2)} → sug. ${elastReal.toFixed(2)} (Δ ${diff.toFixed(2)})\n`;
    });
    res+='\n💡 Aplique en Supuestos o JSON.';
    document.getElementById('calResult').textContent=res;
  };
  reader.readAsText(file);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const map={kpis:'tab-kpis',boardroom:'tab-boardroom',cadenas:'tab-cadenas',grafo:'tab-grafo',supuestos:'tab-supuestos',proyeccion:'tab-proyeccion',calibracion:'tab-calibracion'};
  document.getElementById(map[tab]).classList.add('active');
  const tabs=document.querySelectorAll('.tab');
  const idx=Object.keys(map).indexOf(tab);
  if (idx>=0&&tabs[idx]) tabs[idx].classList.add('active');
  if (tab==='boardroom') renderBoardroom();
  if (tab==='cadenas') renderCadenas();
  if (tab==='grafo') renderGrafo();
  if (tab==='supuestos') renderSupuestos();
  if (tab==='proyeccion') actualizarProyeccion();
}

function abrirModalGuardar(){document.getElementById('modalGuardar').classList.add('active');renderizarEscenariosGuardados();}
function cerrarModalGuardar(){document.getElementById('modalGuardar').classList.remove('active');}
function guardarEscenario(){
  const nombre=document.getElementById('nombreEscenario').value.trim();
  if (!nombre) return alert('Ingrese un nombre');
  const clave='esc_'+nombre.replace(/\s+/g,'_');
  const data={nombre,industria:document.getElementById('industrySelect').value,empresa:document.getElementById('companySelect').value,empresaB:document.getElementById('companySelectB')?.value||'',palancas:leerPalancas(),fecha:new Date().toISOString()};
  localStorage.setItem(clave,JSON.stringify(data));
  document.getElementById('nombreEscenario').value='';
  renderizarEscenariosGuardados();
  alert('✅ Escenario guardado: '+nombre);
}
function renderizarEscenariosGuardados(){
  const container=document.getElementById('listaEscenarios');
  container.innerHTML='';
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('esc_'));
  if (keys.length===0) return container.innerHTML='<p style="color:var(--muted);font-size:.7rem">Sin escenarios.</p>';
  keys.forEach(key=>{
    const data=JSON.parse(localStorage.getItem(key));
    const div=document.createElement('div');div.className='saved-scenario';
    div.innerHTML=`<span>${data.nombre} <small style="color:var(--muted)">(${data.industria})</small></span>`;
    const btnC=document.createElement('button');btnC.textContent='Cargar';btnC.style.cssText='background:var(--teal);border:none;color:#000;padding:.15rem .5rem;border-radius:4px;cursor:pointer;font-size:.65rem;margin:0 .2rem';
    btnC.onclick=()=>{cargarEscenario(data);cerrarModalGuardar();};div.appendChild(btnC);
    const btnD=document.createElement('button');btnD.textContent='🗑';btnD.style.cssText='background:transparent;border:1px solid var(--red);color:var(--red);padding:.15rem .4rem;border-radius:4px;cursor:pointer;font-size:.65rem';
    btnD.onclick=()=>{if (confirm('¿Eliminar?')){localStorage.removeItem(key);renderizarEscenariosGuardados();}};div.appendChild(btnD);
    container.appendChild(div);
  });
}
function cargarEscenario(data){
  if (data.industria&&data.industria!==document.getElementById('industrySelect').value){document.getElementById('industrySelect').value=data.industria;poblarEmpresas();}
  if (data.empresa){document.getElementById('companySelect').value=data.empresa;cargarEmpresa(data.empresa);}
  if (data.empresaB){document.getElementById('companySelectB').value=data.empresaB;cargarEmpresaB(data.empresaB);}
  setTimeout(()=>{
    Object.entries(data.palancas).forEach(([id,val])=>{
      const sl=document.getElementById('sl-'+id),vl=document.getElementById('val-'+id);
      if(sl){sl.value=val;if(vl)vl.textContent=Number(val).toFixed(2);}
    });
    actualizar();
  },300);
}

function compartirURL(){
  const pal=leerPalancas();
  const params=new URLSearchParams();
  params.set('ind',document.getElementById('industrySelect').value);
  params.set('emp',document.getElementById('companySelect').value);
  if (document.getElementById('companySelectB')?.value) params.set('empB',document.getElementById('companySelectB').value);
  Object.entries(pal).forEach(([k,v])=>params.set(k,v.toFixed(2)));
  const url=window.location.origin+window.location.pathname+'?'+params.toString();
  if (navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert('🔗 Enlace copiado'));}
  else{prompt('Copie:',url);}
}
function cargarDesdeURL(){
  const params=new URLSearchParams(window.location.search);
  if (params.toString().length===0) return;
  const ind=params.get('ind'),emp=params.get('emp'),empB=params.get('empB');
  if (ind){document.getElementById('industrySelect').value=ind;poblarEmpresas();}
  if (emp) setTimeout(()=>{document.getElementById('companySelect').value=emp;cargarEmpresa(emp);},200);
  if (empB) setTimeout(()=>{document.getElementById('companySelectB').value=empB;cargarEmpresaB(empB);},300);
  setTimeout(()=>{
    params.forEach((val,key)=>{
      if (['ind','emp','empB'].includes(key)) return;
      const sl=document.getElementById('sl-'+key),vl=document.getElementById('val-'+key);
      if(sl){sl.value=parseFloat(val);if(vl)vl.textContent=Number(val).toFixed(2);}
    });
    actualizar();
  },500);
}

function exportarPDFNarrativo(){
  if (!industriaActual||!estadoActual) return;
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  let y=20;
  const empresa=document.getElementById('empresaBadge')?.textContent||'Sin empresa';
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(6,214,160);doc.text('PRISMA · Informe Ejecutivo',20,y);y+=10;
  doc.setFontSize(14);doc.setTextColor(100);doc.text(industriaActual.nombre,20,y);y+=8;
  doc.setFontSize(11);doc.text('Empresa: '+empresa,20,y);y+=6;
  doc.setFontSize(9);doc.text('Generado: '+new Date().toLocaleString('es-CL'),20,y);y+=15;
  doc.setFontSize(14);doc.setTextColor(30,30,30);doc.text('Principales indicadores',20,y);y+=8;
  doc.setFontSize(10);
  (industriaActual.kpis||[]).slice(0,6).forEach(kpi=>{
    const val=estadoActual[kpi.id]!==undefined?estadoActual[kpi.id]:0;
    let f=Number(val).toFixed(2);if (kpi.formato==='dinero') f='$'+Number(val).toFixed(1)+'M';else if (kpi.formato==='porcentaje') f=Number(val).toFixed(1)+'%';
    doc.text(`${kpi.label}: ${f} ${kpi.unidades}`,25,y);y+=5;
  });
  y+=5;
  const cadena=(industriaActual.cadenas||[])[0];
  if (cadena) {
    doc.setFontSize(12);doc.setTextColor(200,50,50);doc.text('Análisis causal principal',20,y);y+=7;
    doc.setFontSize(10);doc.setTextColor(60,60,60);
    doc.text(`Cadena: ${cadena.nombre}`,25,y);y+=5;doc.text(`Descripción: ${cadena.descripcion}`,25,y);y+=5;doc.text(`Impacto: ${cadena.impacto}`,25,y);y+=8;
  }
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato!=='info');
  let maxDelta=0,kpiMax='';
  kpisNum.forEach(kpi=>{const val=estadoActual[kpi.id]||0,base=kpi.base||0,d=base>0?Math.abs((val-base)/base*100):0;if(d>maxDelta){maxDelta=d;kpiMax=kpi.label;}});
  doc.setFontSize(12);doc.setTextColor(30,30,30);doc.text('Conclusión automática',20,y);y+=7;
  doc.setFontSize(10);doc.text(`La mayor desviación se observa en "${kpiMax}" (${maxDelta.toFixed(1)}% vs base).`,25,y);y+=5;
  doc.text('Se recomienda revisar las palancas asociadas y el escenario de estrés correspondiente.',25,y);
  doc.save('informe_prisma.pdf');
}
