<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISMA · by GL Strategic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#06090e;--surface:#0c1118;--panel:#111922;--card:#141e2b;--border:#1e2d3f;--text:#e2e9f3;--muted:#6b809b;--teal:#00a89d;--gold:#c9a84c;--blue:#378add;--red:#e05252;--warn:#c9a84c;--purple:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
.topbar{background:linear-gradient(135deg,#0c1118,#111922);border-bottom:1px solid var(--border);padding:.4rem 1rem;min-height:48px;display:flex;align-items:center;gap:.6rem;flex-shrink:0;flex-wrap:wrap}
.brand{font-weight:800;font-size:.9rem;color:var(--gold);letter-spacing:-0.3px}
.topbar select,button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.3rem .6rem;border-radius:5px;font-size:.73rem;cursor:pointer}
button{background:var(--teal);color:#000;font-weight:700;border:none}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);padding:.6rem;overflow-y:auto}
.content{flex:1;padding:.6rem;overflow-y:auto}
.palanca{margin-bottom:.55rem}
.palanca label{display:flex;justify-content:space-between;font-size:.7rem;font-weight:600;color:var(--muted)}
.palanca input{width:100%;margin-top:.15rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:.5rem;margin-bottom:.6rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--teal)}
.kpi-card.alert::before{background:var(--red)}
.kpi-card .label{font-size:.6rem;color:var(--muted);text-transform:uppercase}
.kpi-card .value{font-size:1.15rem;font-weight:800;margin:.12rem 0}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem;flex-wrap:wrap}
.tab{padding:.3rem .7rem;border-radius:5px;cursor:pointer;font-size:.72rem;background:var(--panel);border:1px solid var(--border);color:var(--muted)}
.tab.active{background:var(--teal);color:#000;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
canvas{max-height:280px;margin-top:.3rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.plan-table{width:100%;border-collapse:collapse;font-size:.68rem;margin:.5rem 0}
.plan-table th{text-align:left;padding:.3rem .5rem;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
.plan-table td{padding:.3rem .5rem;border-bottom:1px solid var(--border)}
.narrative-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;margin-bottom:.5rem;line-height:1.5}
.grafo-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.4rem;overflow:auto}
.grafo-container svg{width:100%;height:auto;min-height:360px}
.evidence-table{width:100%;border-collapse:collapse;font-size:.65rem}
.evidence-table th{text-align:left;padding:.35rem .5rem;font-size:.58rem;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
.evidence-table td{padding:.35rem .5rem;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sidebar{width:100%;max-height:30vh}.main{flex-direction:column}.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">◆ PRISMA <small style="color:var(--muted);font-size:.55rem">by GL Strategic</small></div>
  <span style="color:var(--muted);font-size:.65rem">Industria:</span>
  <select id="indSel"><option value="acuicola" selected>Acuícola</option><option value="mineria">Minería</option><option value="clinica">Clínica</option><option value="hospital">Hospital</option><option value="retail">Retail</option><option value="logistica">Logística</option><option value="telecom">Telecom</option><option value="agro">Agro</option><option value="energia">Energía</option></select>
  <span style="color:var(--muted);font-size:.65rem">Empresa:</span>
  <select id="empSel" style="min-width:140px"></select>
  <span style="color:var(--muted);font-size:.65rem;margin-left:0.4rem">Escenario:</span>
  <select id="scenarioSel" onchange="loadScn(this.value)"><option value="">— Personalizado —</option></select>
  <button onclick="runMC()">🎲 Montecarlo</button>
  <button onclick="resetSliders()">↺ Reset</button>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div id="palancasContainer"></div>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('kpis')">📊 KPIs & Resumen</button>
      <button class="tab" onclick="switchTab('plan')">🎯 Plan de Acción</button>
      <button class="tab" onclick="switchTab('cadenas')">⛓️ Cadenas</button>
      <button class="tab" onclick="switchTab('grafo')">🔗 Grafo</button>
      <button class="tab" onclick="switchTab('evidencia')">📋 Evidencia</button>
      <button class="tab" onclick="switchTab('escenarios')">📊 Escenarios</button>
    </div>
    <div id="tab-kpis" class="tab-content active"><div class="kpi-grid" id="kpiContainer"></div><div class="chart-row"><div><canvas id="impactChart"></canvas></div><div><canvas id="tornadoChart"></canvas></div></div><div class="narrative-box" id="execSummary"></div></div>
    <div id="tab-plan" class="tab-content"><div id="planContent"></div></div>
    <div id="tab-cadenas" class="tab-content"><div id="cadenasContent"></div></div>
    <div id="tab-grafo" class="tab-content"><div class="grafo-container" id="grafoContainer"></div></div>
    <div id="tab-evidencia" class="tab-content"><div id="evidenciaContent"></div></div>
    <div id="tab-escenarios" class="tab-content"><div id="escenariosContent"></div></div>
  </div>
</div>
<script>
const CTX={dolar_clp:920};
// Empresas
const COMPANIES={
  acuicola:[{id:"aquachile",nombre:"AquaChile",perfil:{biomasaInicial:22000,fcr:1.28,mort:6.5,calig:2.2,yield:84,costoAlim:1150,costoProc:1.05,precioUSD:6.8}},{id:"mowi",nombre:"Mowi Chile",perfil:{biomasaInicial:24000,fcr:1.25,mort:6.0,calig:2.0,yield:85,costoAlim:1100,costoProc:1.00,precioUSD:7.0}},{id:"blumar",nombre:"Blumar",perfil:{biomasaInicial:14000,fcr:1.33,mort:7.8,calig:3.0,yield:81.5,costoAlim:1220,costoProc:1.15,precioUSD:6.2}}],
  mineria:[{id:"codelco",nombre:"Codelco Andina",perfil:{produccionBase:60000,ley:0.72,leyCabezaBase:0.72,recuperacion:0.86,depreciacion:75,costoInsumos:20,costoEnergia:85,precioCobre:4.0}}],
  clinica:[{id:"alemana",nombre:"Clínica Alemana",perfil:{camas:120,ocupacion:84,estancia:3.5,tarifa:450,readmision:2.8,costoInsumos:210,inflacion:4.2}}],
  hospital:[{id:"sotero",nombre:"Hospital Sótero del Río",perfil:{camas:300,ocupacion:88,estancia:4.8,presupuestoBase:52e9,costoInsumos:250,avanceLE:12,ejecucion:96}}]
};
// Industrias
const IND={
  acuicola:{
    nombre:"Acuícola — Salmón Chileno", supuestos:{biomasaInicial:12500,costoAlim:1200,costoSmolt:0.45,costoLabor:0.55,costoProc:1.15,fx:920},
    nodos:[{id:"fcr",label:"FCR",tipo:"driver",unidades:"kg/kg",elasticidad:-0.92,icon:"🍽️"},{id:"mort",label:"Mortalidad (%)",tipo:"driver",unidades:"%",elasticidad:-0.85,icon:"🦠"},{id:"calig",label:"Caligus",tipo:"driver",unidades:"índice",elasticidad:-0.65,icon:"🦐"},{id:"yield",label:"Yield (%)",tipo:"driver",unidades:"%",elasticidad:0.88,icon:"🔪"},{id:"precioUSD",label:"Precio USD/kg",tipo:"driver",unidades:"USD/kg",elasticidad:1.10,icon:"💲"},{id:"costoAlim",label:"Costo Alimento",tipo:"driver",unidades:"CLP/kg",elasticidad:-0.5,icon:"🌾"},{id:"biomasa",label:"Biomasa (t)",tipo:"intermedio",unidades:"ton",icon:"🐟"},{id:"volumen",label:"Volumen (t)",tipo:"intermedio",unidades:"ton",icon:"📦"},{id:"ebitda",label:"EBITDA",tipo:"resultado",unidades:"M USD",icon:"💰"},{id:"ebitKg",label:"EBIT/kg",tipo:"resultado",unidades:"USD/kg",icon:"💎"}],
    kpis:[{id:"fcr",label:"FCR",base:1.30,formato:"num2"},{id:"mort",label:"Mortalidad",base:8,formato:"pct"},{id:"yield",label:"Yield",base:82,formato:"pct"},{id:"precioUSD",label:"Precio USD",base:6.0,formato:"usd2"},{id:"biomasa",label:"Biomasa (t)",base:11500,formato:"num"},{id:"ebitda",label:"EBITDA",base:0,formato:"usdM"},{id:"ebitKg",label:"EBIT/kg",base:0.73,formato:"usd2"}],
    arcos:[{origen:"fcr",destino:"ebitda",polaridad:"negativo"},{origen:"mort",destino:"biomasa",polaridad:"negativo"},{origen:"calig",destino:"ebitda",polaridad:"negativo"},{origen:"yield",destino:"volumen",polaridad:"positivo"},{origen:"precioUSD",destino:"ebitda",polaridad:"positivo"},{origen:"costoAlim",destino:"ebitda",polaridad:"negativo"},{origen:"biomasa",destino:"volumen",polaridad:"positivo"},{origen:"volumen",destino:"ebitda",polaridad:"positivo"}],
    cadenas:[
      {nombre:"Precio internacional",causa:"Mercado global (USA, Brasil, China)",impacto:"Cada +$0.10/kg → +$0.94M EBITDA",accion:"Negociar contratos en Q1‑Q2. Diversificar mercados premium.",horizonte:"Inmediato",delta:"+0.94M",cambio:"+$0.10/kg",polaridad:"positivo"},
      {nombre:"Eficiencia alimenticia (FCR)",causa:"Desperdicio de alimento",impacto:"Cada −0.05 FCR → +$0.88M EBITDA",accion:"Monitoreo digital de alimentación.",horizonte:"14‑45 días",delta:"+0.88M",cambio:"−0.05 pts",polaridad:"positivo"},
      {nombre:"Mejora de yield",causa:"Merma en fileteado",impacto:"Cada +1 pp yield → +$0.63M EBITDA",accion:"Optimizar línea de corte.",horizonte:"30‑60 días",delta:"+0.63M",cambio:"+1 pp",polaridad:"positivo"},
      {nombre:"Reducir mortalidad",causa:"SRS (75% muertes infecciosas)",impacto:"Cada −1 pp mort. → +$0.56M EBITDA",accion:"Vacunación y monitoreo O₂.",horizonte:"30‑90 días",delta:"+0.56M",cambio:"−1 pp",polaridad:"positivo"},
      {nombre:"Control de Caligus",causa:"Infestación de piojos",impacto:"Cada −1 índice → +$0.25M EBITDA",accion:"Tratamiento coordinado por barrio.",horizonte:"7‑30 días",delta:"+0.25M",cambio:"−1 índice",polaridad:"positivo"}
    ],
    escenarios:[{nombre:"Base 2025",palancas:{fcr:1.30,mort:8,calig:3,yield:82,precioUSD:6.0,costoAlim:1200}},{nombre:"Crisis Sanitaria",palancas:{fcr:1.45,mort:14,calig:7,yield:78,precioUSD:5.0,costoAlim:1350}},{nombre:"Recuperación 2026",palancas:{fcr:1.26,mort:6.5,calig:2.2,yield:84,precioUSD:7.0,costoAlim:1100}}],
    initState:{fcr:1.30,mort:8,calig:3,yield:82,precioUSD:6.0,costoAlim:1200},
    formulaPrincipal:"function(p,s,ctx){var b=s.biomasaInicial*(1-p.mort/100);var v=b*(p.yield/100);var ing=v*p.precioUSD;var fx=s.fx||920;var ingCLP=ing*1e6*fx;var cAlim=s.biomasaInicial*p.fcr*p.costoAlim*1000;var cSmolt=s.biomasaInicial*s.costoSmolt*fx*1000;var cLabor=s.biomasaInicial*s.costoLabor*fx*1000;var cSan=(1500+p.calig*250)*1000;var cProc=b*(p.yield/100)*s.costoProc*fx*1000;var cTotal=cAlim+cSmolt+cLabor+cSan+cProc;var ebitdaCLP=ingCLP-cTotal;var ebitda=ebitdaCLP/(fx*1e6);var ebitKg=ebitdaCLP/(v*1000*fx);return{biomasa:Math.round(b),volumen:Math.round(v),ebitda:+ebitda.toFixed(2),ebitKg:+ebitKg.toFixed(2)};}"
  },
  mineria:{
    nombre:"Minería del Cobre",supuestos:{produccionBase:50000,leyCabezaBase:0.7,recuperacion:0.85,factorLibrasPorTon:2204.62,costoPlantaBase:8},
    nodos:[{id:"precioCobre",label:"Precio Cobre",tipo:"driver",unidades:"USD/lb",elasticidad:1.3,icon:"📊"},{id:"ley",label:"Ley Mineral",tipo:"driver",unidades:"%",elasticidad:-0.7,icon:"⛏️"},{id:"costoInsumos",label:"Costo Insumos",tipo:"driver",unidades:"USD/ton",elasticidad:-0.6,icon:"🧪"},{id:"costoEnergia",label:"Costo Energía",tipo:"driver",unidades:"USD/MWh",elasticidad:-0.4,icon:"⚡"},{id:"produccionCobre",label:"Cobre Fino",tipo:"intermedio",unidades:"ton",icon:"📦"},{id:"ebitda",label:"EBITDA",tipo:"resultado",unidades:"M USD",icon:"💰"}],
    kpis:[{id:"precioCobre",label:"Precio Cobre",base:4.0,formato:"usd2"},{id:"ley",label:"Ley Mineral",base:0.65,formato:"pct"},{id:"produccionCobre",label:"Cobre Fino",base:50000,formato:"num"},{id:"ebitda",label:"EBITDA",base:0,formato:"usdM"}],
    arcos:[{origen:"precioCobre",destino:"ebitda",polaridad:"positivo"},{origen:"ley",destino:"produccionCobre",polaridad:"positivo"},{origen:"costoInsumos",destino:"ebitda",polaridad:"negativo"},{origen:"costoEnergia",destino:"ebitda",polaridad:"negativo"}],
    cadenas:[{nombre:"Precio del cobre",causa:"Mercado global",impacto:"Cada +$0.10/lb → +$1.1M",accion:"Cobertura con futuros.",horizonte:"Inmediato",delta:"+1.10M",cambio:"+$0.10/lb",polaridad:"positivo"}],
    escenarios:[{nombre:"Base",palancas:{precioCobre:4.0,ley:0.65,costoInsumos:22,costoEnergia:90}},{nombre:"Superciclo",palancas:{precioCobre:5.5,ley:0.72,costoInsumos:20,costoEnergia:75}}],
    initState:{precioCobre:4.0,ley:0.65,costoInsumos:22,costoEnergia:90},
    formulaPrincipal:"function(p,s,ctx){var prod=s.produccionBase*(p.ley/s.leyCabezaBase);prod=Math.max(1000,prod);var ing=prod*s.factorLibrasPorTon*p.precioCobre;var mineral=prod/(p.ley/100*s.recuperacion);var cMina=mineral*(p.costoInsumos);var cPlanta=mineral*s.costoPlantaBase;var ebitda=(ing-cMina-cPlanta)/1e6;return{produccionCobre:Math.round(prod),ebitda:+ebitda.toFixed(2)};}"
  },
  clinica:{
    nombre:"Clínica Privada", supuestos:{camas:85,costoFijoPorCama:85000000,factorReadmision:0.45,diasAno:365},
    nodos:[{id:"ocupacion",label:"Ocupación",tipo:"driver",unidades:"%",elasticidad:1.2,icon:"🛏️"},{id:"estancia",label:"Estancia Media",tipo:"driver",unidades:"días",elasticidad:-0.75,icon:"⏱️"},{id:"tarifa",label:"Tarifa Día‑Cama",tipo:"driver",unidades:"$k",elasticidad:1.05,icon:"💵"},{id:"volumen",label:"Vol. Pacientes",tipo:"intermedio",unidades:"pac.",icon:"🏥"},{id:"margen",label:"Margen Oper.",tipo:"resultado",unidades:"M CLP",icon:"💰"}],
    kpis:[{id:"ocupacion",label:"Ocupación",base:82,formato:"pct"},{id:"estancia",label:"Estancia",base:3.8,formato:"num1"},{id:"margen",label:"Margen",base:0,formato:"usdM"}],
    arcos:[{origen:"ocupacion",destino:"volumen",polaridad:"positivo"},{origen:"estancia",destino:"volumen",polaridad:"negativo"},{origen:"tarifa",destino:"margen",polaridad:"positivo"}],
    cadenas:[{nombre:"Ocupación",causa:"Camas disponibles",impacto:"+1 pp → +$1.8M",accion:"Optimizar admisión/alta.",horizonte:"1-3 meses",delta:"+1.80M",cambio:"+1 pp",polaridad:"positivo"}],
    escenarios:[{nombre:"Base",palancas:{ocupacion:82,estancia:3.8,tarifa:310,costoInsumos:185,inflacion:4.2}}],
    initState:{ocupacion:82,estancia:3.8,tarifa:310,costoInsumos:185,inflacion:4.2},
    formulaPrincipal:"function(p,s,ctx){var rot=s.diasAno/Math.max(p.estancia,0.5);var vol=Math.round(s.camas*(p.ocupacion/100)*rot);var ing=vol*p.tarifa*1000*p.estancia*(1-3.2/100*s.factorReadmision);var cVar=vol*(p.costoInsumos*1000);var cFijo=s.camas*s.costoFijoPorCama;var cTotal=(cVar+cFijo)*(1+(p.inflacion||4.2)/100);return{volumen:vol,margen:+((ing-cTotal)/1e6).toFixed(2)};}"
  },
  hospital:{
    nombre:"Hospital Público", supuestos:{camas:250,presupuestoBase:42000000000,arancelGRD:1850000,leInicial:5200,diasAno:365},
    nodos:[{id:"ocupacion",label:"Ocupación",tipo:"driver",unidades:"%",elasticidad:1.2,icon:"🛏️"},{id:"estancia",label:"Estancia",tipo:"driver",unidades:"días",elasticidad:-0.75,icon:"⏱️"},{id:"costoInsumos",label:"Costo Insumos",tipo:"driver",unidades:"$k",elasticidad:-0.5,icon:"🧪"},{id:"avanceLE",label:"Avance LE",tipo:"driver",unidades:"%",elasticidad:0.9,icon:"🏃"},{id:"ejecucion",label:"Ejec. Presup.",tipo:"driver",unidades:"%",elasticidad:-0.5,icon:"💵"},{id:"inflacion",label:"Inflación",tipo:"driver",unidades:"%",elasticidad:-0.4,icon:"📉"},{id:"egresos",label:"Egresos",tipo:"intermedio",unidades:"pac.",icon:"🚪"},{id:"deficitPct",label:"Déficit %",tipo:"resultado",unidades:"%",icon:"📉"}],
    kpis:[{id:"ocupacion",label:"Ocupación",base:84,formato:"pct"},{id:"estancia",label:"Estancia",base:5.2,formato:"num1"},{id:"egresos",label:"Egresos",base:0,formato:"num"},{id:"deficitPct",label:"Déficit %",base:0,formato:"pct"}],
    arcos:[{origen:"ocupacion",destino:"egresos",polaridad:"positivo"},{origen:"estancia",destino:"egresos",polaridad:"negativo"},{origen:"costoInsumos",destino:"deficitPct",polaridad:"negativo"},{origen:"avanceLE",destino:"deficitPct",polaridad:"positivo"}],
    cadenas:[{nombre:"Avance LE",causa:"Falta de pabellones",impacto:"+1 pp → -0.09 pp déficit",accion:"Ampliar horarios quirúrgicos.",horizonte:"30-60 días",delta:"-0.09 pp",cambio:"+1 pp",polaridad:"positivo"}],
    escenarios:[{nombre:"Base",palancas:{ocupacion:84,estancia:5.2,costoInsumos:220,avanceLE:12,ejecucion:96,inflacion:4.2}}],
    initState:{ocupacion:84,estancia:5.2,costoInsumos:220,avanceLE:12,ejecucion:96,inflacion:4.2},
    formulaPrincipal:"function(p,s,ctx){var rot=s.diasAno/Math.max(p.estancia,0.5);var egr=Math.round(s.camas*(p.ocupacion/100)*rot);var ingGRD=egr*1.25*s.arancelGRD;var presEj=s.presupuestoBase*(p.ejecucion/100);var cFijo=s.camas*112000000;var cVar=egr*(p.costoInsumos*1000);var gTotal=(cFijo+cVar)*(1+(p.inflacion||4.2)/100);var deficit=gTotal-(ingGRD+presEj);return{egresos:egr,deficitPct:+(deficit/presEj*100).toFixed(1)};}"
  }
};
// Las demás industrias se auto‑generan con estructura básica si no existen
['retail','logistica','telecom','agro','energia'].forEach(k=>{
  if(!IND[k]) IND[k]={
    nombre:k.charAt(0).toUpperCase()+k.slice(1), supuestos:{}, nodos:[], kpis:[], arcos:[], cadenas:[], escenarios:[], initState:{},
    formulaPrincipal:"function(){return{}}"
  };
});

let industriaActual=null,perfilCliente={},estadoActual={},chartInst=null,tornadoInst=null;

function obtenerFormula(ind){if(typeof ind.formulaPrincipal==='function')return ind.formulaPrincipal;try{return eval('('+ind.formulaPrincipal+')');}catch(e){return()=>({});}}
function simular(palancas){const f=obtenerFormula(industriaActual);const s={...(industriaActual.supuestos||{}),...perfilCliente};try{return f(palancas,s,CTX);}catch(e){return{};}}
function leerPalancas(){const p={};(industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{const sl=document.getElementById('sl-'+n.id);p[n.id]=sl?parseFloat(sl.value):(industriaActual.initState[n.id]||0);});return p;}
function actualizar(){estadoActual=simular(leerPalancas());renderAll();}

function construirSidebar(){
  const c=document.getElementById('palancasContainer');c.innerHTML='';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const init=industriaActual.initState[n.id]||0, min=init*0.4, max=init*1.6;
    const d=document.createElement('div');d.className='palanca';
    d.innerHTML=`<label><span>${n.icon||''} ${n.label}</span><span id="val-${n.id}" style="color:var(--teal);font-weight:700;font-size:.7rem">${init.toFixed(2)}</span></label><input type="range" id="sl-${n.id}" min="${min}" max="${max}" value="${init}" step="${(max-min)/200}">`;
    c.appendChild(d);
    document.getElementById('sl-'+n.id).addEventListener('input',()=>{const s=document.getElementById('sl-'+n.id),v=document.getElementById('val-'+n.id);if(s&&v)v.textContent=parseFloat(s.value).toFixed(2);actualizar();});
  });
}
function poblarEmpresas(){
  const key=document.getElementById('indSel').value;
  const sel=document.getElementById('empSel');sel.innerHTML='';
  (COMPANIES[key]||[]).forEach(c=>sel.appendChild(new Option(c.nombre,c.id)));
  if((COMPANIES[key]||[]).length>0)cargarEmpresa(COMPANIES[key][0].id);
}
function cargarEmpresa(id){
  const key=document.getElementById('indSel').value;
  const company=(COMPANIES[key]||[]).find(c=>c.id===id);
  if(!company)return;
  if(IND[key]){const ind=JSON.parse(JSON.stringify(IND[key]));if(typeof ind.formulaPrincipal==='string')ind.formulaPrincipal=eval('('+ind.formulaPrincipal+')');industriaActual=ind;}
  perfilCliente={...(company.perfil||{})};
  construirSidebar();
  Object.entries(company.perfil||{}).forEach(([k,v])=>{const sl=document.getElementById('sl-'+k);if(sl){sl.value=v;const vl=document.getElementById('val-'+k);if(vl)vl.textContent=v.toFixed(2);}});
  actualizar();
}
function loadScn(idx){if(!industriaActual||idx==='')return;const esc=industriaActual.escenarios[parseInt(idx)];if(!esc)return;Object.entries(esc.palancas).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}
function resetSliders(){if(!industriaActual)return;Object.entries(industriaActual.initState||{}).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}

function fmt(val,f){const num=Number(val);if(f==='usdM')return '$'+(num/1e6).toFixed(1)+' M';if(f==='usd2')return '$'+num.toFixed(2);if(f==='pct')return num.toFixed(1)+'%';if(f==='num2')return num.toFixed(2);if(f==='num1')return num.toFixed(1);if(f==='num')return num.toLocaleString('es-CL',{maximumFractionDigits:0});return num.toFixed(2);}

function renderAll(){renderKPIs();renderPlan();renderCadenas();renderGrafo();renderEvidencia();renderEscenarios();}

function renderKPIs(){
  const c=document.getElementById('kpiContainer');if(!industriaActual)return;c.innerHTML='';
  const nodos=industriaActual.nodos||[];
  (industriaActual.kpis||[]).slice(0,6).forEach(kpi=>{
    let val;
    const nodo=nodos.find(n=>n.id===kpi.id);
    if(nodo&&nodo.tipo==='driver'){const sl=document.getElementById('sl-'+kpi.id);val=sl?parseFloat(sl.value):(industriaActual.initState[kpi.id]||0);}
    else{val=estadoActual[kpi.id]!==undefined?estadoActual[kpi.id]:0;}
    const base=kpi.base||0; const pct=base?((val-base)/Math.abs(base)*100):0;
    const card=document.createElement('div');card.className=`kpi-card ${pct<-10?'alert':''}`;
    card.innerHTML=`<div class="label">${kpi.label}</div><div class="value" style="color:${kpi.id.includes('ebitda')||kpi.id.includes('margen')?'var(--gold)':kpi.id.includes('costo')||kpi.id.includes('deficit')?'var(--red)':'var(--teal)'}">${fmt(val,kpi.formato)}</div><div style="font-size:.6rem;color:var(--muted)">${pct!==0?(pct>0?'↑':'↓')+Math.abs(pct).toFixed(1)+'% vs base':'—'}</div>`;
    c.appendChild(card);
  });
  renderCharts();
  renderExecSummary();
}
function renderCharts(){
  if(chartInst)chartInst.destroy();if(tornadoInst)tornadoInst.destroy();
  const c1=document.getElementById('impactChart'),c2=document.getElementById('tornadoChart');
  if(!c1||!c2||!industriaActual)return;
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato);
  chartInst=new Chart(c1.getContext('2d'),{type:'bar',data:{labels:kpisNum.map(k=>k.label),datasets:[{data:kpisNum.map(k=>estadoActual[k.id]||0),backgroundColor:'#c9a84c',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#6b809b'}},x:{ticks:{color:'#6b809b'}}}}});
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const impacts=drivers.map(d=>({label:d.label,delta:(d.elasticidad||0)*3}));
  tornadoInst=new Chart(c2.getContext('2d'),{type:'bar',data:{labels:impacts.map(i=>i.label),datasets:[{data:impacts.map(i=>i.delta),backgroundColor:impacts.map(i=>i.delta>=0?'rgba(0,168,157,.7)':'rgba(224,82,82,.7)'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b809b'}},y:{ticks:{color:'#6b809b'}}}}});
}
function renderExecSummary(){
  const el=document.getElementById('execSummary');if(!industriaActual)return;
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  if(!drivers.length)return;
  const top=drivers.map(d=>({label:d.label,init:industriaActual.initState[d.id]||0,val:document.getElementById('sl-'+d.id)?parseFloat(document.getElementById('sl-'+d.id).value):0,elast:d.elasticidad||0})).sort((a,b)=>Math.abs((b.val-b.init)/b.init*b.elast)-Math.abs((a.val-a.init)/a.init*a.elast))[0];
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));
  el.innerHTML=`<strong>📋 Resumen Ejecutivo — ${industriaActual.nombre}</strong><br>La variable <strong style="color:var(--gold)">${top.label}</strong> presenta la mayor desviación (${((top.val-top.init)/top.init*100).toFixed(0)}% vs base) y podría mover el resultado en ≈<strong style="color:var(--teal)">$${(Math.abs(top.elast)*0.4).toFixed(2)}M</strong> por cada ±1% de cambio. Consulte el <em>Plan de Acción</em> para acciones priorizadas.`;
}
function renderPlan(){
  const c=document.getElementById('planContent');if(!industriaActual||!industriaActual.cadenas)return;
  let html=`<h3 style="color:var(--gold);margin-bottom:.5rem">🎯 Plan de Acción — Impacto Marginal</h3><table class="plan-table"><thead><tr><th>#</th><th>Palanca</th><th>Cambio</th><th>Δ EBITDA</th><th>Lógica Causal</th><th>Plazo</th></tr></thead><tbody>`;
  (industriaActual.cadenas||[]).forEach((cd,i)=>{html+=`<tr><td>${i+1}</td><td><strong>${cd.nombre}</strong></td><td>${cd.cambio||''}</td><td style="color:var(--teal);font-weight:700">${cd.delta||''}</td><td style="font-size:.62rem;color:var(--muted)">${cd.impacto||''}</td><td>${cd.horizonte||''}</td></tr>`;});
  html+=`</tbody></table><div style="font-size:.65rem;color:var(--muted);margin-top:.4rem">📌 <strong>Recomendación:</strong> Las palancas de mercado (precio) son externas; las operacionales (FCR, mortalidad) dependen de gestión interna. Priorice según horizonte y magnitud.</div>`;
  c.innerHTML=html;
}
function renderCadenas(){
  const c=document.getElementById('cadenasContent');if(!industriaActual||!industriaActual.cadenas)return;
  let html='<h3 style="color:var(--gold);margin-bottom:.5rem">⛓️ Análisis Causal</h3>';
  (industriaActual.cadenas||[]).forEach(cd=>{html+=`<div style="background:var(--card);border-left:3px solid ${cd.polaridad==='positivo'?'var(--teal)':'var(--red)'};border-radius:8px;padding:.6rem;margin-bottom:.4rem"><strong>${cd.nombre}</strong><br><small style="color:var(--muted)">${cd.causa} → ${cd.impacto}</small><br><small style="color:var(--teal)">🔧 ${cd.accion}</small> <span style="font-size:.6rem;color:var(--muted)">(${cd.horizonte})</span></div>`;});
  c.innerHTML=html;
}
function renderGrafo(){
  const container=document.getElementById('grafoContainer');if(!industriaActual||!industriaActual.nodos){container.innerHTML='';return;}
  const nodos=industriaActual.nodos; const arcos=industriaActual.arcos||[];
  const cols={driver:{x:20,color:'#3a7bd5'},intermedio:{x:280,color:'#f0a04b'},resultado:{x:540,color:'#c9a84c'}};
  const height=Math.max(400, nodos.length*55+100);
  let svg=`<svg viewBox="0 0 720 ${height}"><defs><filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrowPos" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#06d6a0"/></marker><marker id="arrowNeg" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#e05252"/></marker></defs>`;
  const pos={};
  // Posicionar nodos
  ['driver','intermedio','resultado'].forEach(tipo=>{
    const arr=nodos.filter(n=>n.tipo===tipo); const col=cols[tipo];
    arr.forEach((n,i)=>{
      const y=60+i*80, w=140, h=65;
      pos[n.id]={x:col.x+w/2, y:y+h/2, left:col.x, top:y, w, h};
      let val; 
      if(n.tipo==='driver'){const sl=document.getElementById('sl-'+n.id);val=sl?parseFloat(sl.value):(industriaActual.initState[n.id]||0);}
      else{val=estadoActual[n.id]!==undefined?estadoActual[n.id]:0;}
      const valStr=typeof val==='number'&&val>=1000?val.toLocaleString('es-CL',{maximumFractionDigits:0}):typeof val==='number'?val.toFixed(2):val;
      svg+=`<g filter="url(#glow)"><rect x="${col.x}" y="${y}" width="${w}" height="${h}" rx="8" fill="#111922" stroke="${col.color}" stroke-width="1.5"/><text x="${col.x+8}" y="${y+22}" font-size="14">${n.icon||'📌'}</text><text x="${col.x+28}" y="${y+22}" font-size="11" font-weight="600" fill="${col.color}">${n.label}</text><text x="${col.x+8}" y="${y+50}" font-size="14" font-weight="700" fill="#e2e9f3">${valStr}</text><text x="${col.x+8}" y="${y+62}" font-size="9" fill="#6b809b">${n.unidades||''}</text></g>`;
    });
  });
  // Flechas
  arcos.forEach(a=>{
    const o=pos[a.origen], d=pos[a.destino]; if(!o||!d)return;
    const color=a.polaridad==='positivo'?'#06d6a0':'#e05252';
    const marker=a.polaridad==='positivo'?'url(#arrowPos)':'url(#arrowNeg)';
    const x1=o.left+o.w, y1=o.y, x2=d.left, y2=d.y;
    const mx=(x1+x2)/2;
    svg+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="${color}" stroke-width="2" fill="none" marker-end="${marker}" opacity="0.8"/>`;
  });
  svg+=`</svg>`;
  container.innerHTML=svg;
}
function renderEvidencia(){
  const c=document.getElementById('evidenciaContent');if(!industriaActual)return;
  let html=`<h3 style="color:var(--gold);margin-bottom:.5rem">📊 Evidencia — Elasticidades y Supuestos</h3>
  <table class="evidence-table"><thead><tr><th>Driver</th><th>Elasticidad</th><th>Supuesto Base</th></tr></thead><tbody>`;
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    html+=`<tr><td>${n.label}</td><td>${n.elasticidad.toFixed(2)}</td><td>${industriaActual.initState[n.id]||0} ${n.unidades}</td></tr>`;
  });
  html+=`</tbody></table><div style="font-size:.65rem;color:var(--muted);margin-top:.5rem">📌 <strong>Fórmula principal:</strong> Los ingresos se calculan como volumen × precio USD × FX; los costos incluyen alimento, smolt, labor, sanitario y procesamiento.</div>`;
  c.innerHTML=html;
}
function renderEscenarios(){
  const c=document.getElementById('escenariosContent');if(!industriaActual)return;
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));
  let html='<h3 style="color:var(--gold);margin-bottom:.5rem">📋 Comparación de Escenarios</h3><table class="evidence-table"><thead><tr><th>Escenario</th>';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<th>${d.label}</th>`);
  if(kpiRes)html+=`<th>${kpiRes.label}</th>`;html+='</tr></thead><tbody>';
  (industriaActual.escenarios||[]).forEach(esc=>{
    html+=`<tr><td><strong>${esc.nombre}</strong></td>`;
    (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<td>${esc.palancas[d.id]||'—'}</td>`);
    if(kpiRes){try{const f=obtenerFormula(industriaActual);const r=f(esc.palancas,industriaActual.supuestos,CTX);html+=`<td style="font-weight:700;color:${(r[kpiRes.id]||0)>(estadoActual[kpiRes.id]||0)?'var(--teal)':'var(--red)'}">${fmt(r[kpiRes.id]||0,kpiRes.formato)}</td>`;}catch(e){html+='<td>—</td>';}}
    html+='</tr>';
  });
  html+='</tbody></table>';
  c.innerHTML=html;
}
function runMC(){
  if(!industriaActual)return;const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');const res=[];for(let i=0;i<500;i++){const pal={};drivers.forEach(n=>{pal[n.id]=(estadoActual[n.id]||industriaActual.initState[n.id]||0)*(0.85+Math.random()*0.3);});const r=simular(pal);const kr=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));if(kr)res.push(r[kr.id]||0);}
  if(res.length<10)return;const sorted=[...res].sort((a,b)=>a-b);const p10=sorted[50],p50=sorted[250],p90=sorted[450];alert(`Montecarlo (500 simulaciones)\nP10: ${fmt(p10,'usdM')}\nP50: ${fmt(p50,'usdM')}\nP90: ${fmt(p90,'usdM')}`);
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const map={kpis:'tab-kpis',plan:'tab-plan',cadenas:'tab-cadenas',grafo:'tab-grafo',evidencia:'tab-evidencia',escenarios:'tab-escenarios'};
  document.getElementById(map[tab]).classList.add('active');
  [...document.querySelectorAll('.tab')].find(t=>t.textContent.includes(Object.keys(map).find(k=>map[k]===map[tab])))?.classList.add('active');
}
