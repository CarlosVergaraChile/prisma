<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>PRISMA · by GL Strategic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --surface:#111318; --panel:#181c23; --card:#1a2030;
  --border:#222834; --text:#e4e9f2; --muted:#6b7a92;
  --teal:#00a89d; --gold:#d4a843; --gold-lt:#ecc96a; --blue:#3a8fe0; --red:#e05252; --warn:#d4a843;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(212,168,67,.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(0,168,157,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.layout{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
/* ── TOPBAR ── */
.topbar{background:linear-gradient(135deg,#0a0c0f,#111318);border-bottom:1px solid var(--border);padding:.4rem 1.2rem;min-height:52px;display:flex;align-items:center;gap:.8rem;flex-shrink:0;flex-wrap:wrap}
.brand{font-weight:800;font-size:.95rem;color:var(--gold);white-space:nowrap;display:flex;align-items:center;gap:.5rem}
.brand .diamond{color:var(--teal);font-size:1.2rem}
.topbar select,input[type=file],button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.35rem .7rem;border-radius:6px;font-size:.78rem;cursor:pointer}
.topbar button{background:var(--teal);color:#000;font-weight:700;border:none;transition:all .2s}
.topbar button:hover{filter:brightness(1.15)}
.topbar button.secondary{background:transparent;color:var(--teal);border:1px solid var(--teal)}
.separator{width:1px;height:20px;background:var(--border);margin:0 .2rem}
/* ── MAIN ── */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:320px;background:var(--panel);border-right:1px solid var(--border);padding:.8rem;overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:.8rem;overflow-y:auto}
/* ── SLIDERS ── */
.palanca{margin-bottom:.7rem}
.palanca label{display:flex;justify-content:space-between;font-size:.73rem;font-weight:600;color:var(--muted)}
.palanca input{width:100%;margin-top:.15rem}
.palanca .range-labels{display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted)}
/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-bottom:.8rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),transparent)}
.kpi-card .label{font-size:.62rem;color:var(--muted);text-transform:uppercase}
.kpi-card .value{font-size:1.3rem;font-weight:800;margin:.15rem 0;line-height:1}
.kpi-card .value.gold{color:var(--gold)} .kpi-card .value.teal{color:var(--teal)}
.kpi-card .value.red{color:var(--red)} .kpi-card .value.blue{color:var(--blue)}
.kpi-card .sub{font-size:.58rem;color:var(--muted)}
/* ── SEMÁFORO ── */
.semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.semaforo.verde{background:#19a06b;box-shadow:0 0 6px #19a06b}
.semaforo.amarillo{background:#d4a843;box-shadow:0 0 6px #d4a843}
.semaforo.rojo{background:#e05252;box-shadow:0 0 6px #e05252}
/* ── TABS ── */
.tabs{display:flex;gap:.35rem;margin-bottom:.8rem;flex-wrap:wrap}
.tab{padding:.35rem .8rem;border-radius:6px;cursor:pointer;font-size:.73rem;background:var(--panel);border:1px solid var(--border);color:var(--muted);transition:all .2s}
.tab.active{background:var(--teal);color:#000;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
/* ── CHARTS ── */
canvas{max-height:300px;margin-top:.4rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
/* ── BOARDROOM ── */
.board-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:.8rem;margin-bottom:.8rem}
.exec-hero{background:linear-gradient(135deg,rgba(212,168,67,.08),rgba(0,168,157,.06));border:1px solid rgba(212,168,67,.18);border-radius:12px;padding:1rem 1.2rem;margin-bottom:.8rem}
.exec-eyebrow{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:.3rem}
.exec-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.25rem}
.exec-copy{font-size:.75rem;color:var(--muted);line-height:1.5}
.recommendation-box{background:linear-gradient(135deg,rgba(0,168,157,.1),rgba(58,143,224,.06));border:1px solid rgba(0,168,157,.2);border-radius:12px;padding:.9rem 1rem;margin-bottom:.8rem}
.rec-title{font-size:.75rem;font-weight:700;color:var(--teal);margin-bottom:.3rem}
.rec-body{font-size:.7rem;color:var(--muted);line-height:1.6}
.rec-highlight{color:var(--gold);font-weight:700}
/* ── TABLAS ── */
.data-table{width:100%;border-collapse:collapse;font-size:.7rem;margin-top:.4rem}
.data-table th{text-align:left;padding:.4rem .6rem;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);font-family:'Space Mono',monospace}
.data-table td{padding:.4rem .6rem;border-bottom:1px solid rgba(34,40,52,.5);color:var(--text)}
.data-table tr:hover{background:rgba(212,168,67,.04)}
.td-mono{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted)}
.td-positive{color:var(--teal);font-weight:700}
.td-negative{color:var(--red);font-weight:700}
/* ── TORNADO ── */
.tornado-row{display:flex;align-items:center;gap:.5rem;margin:.2rem 0;font-size:.7rem}
.tornado-bar{height:18px;border-radius:4px;min-width:4px}
.tornado-bar.pos{background:linear-gradient(90deg,var(--teal),transparent);margin-left:auto}
.tornado-bar.neg{background:linear-gradient(270deg,var(--red),transparent);margin-right:auto}
.tornado-label{width:120px;flex-shrink:0;text-align:right;color:var(--muted)}
.tornado-val{width:70px;font-weight:700;font-size:.68rem;text-align:right}
/* ── MARGINAL ── */
.marginal-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem}
.marginal-rank{width:24px;height:24px;border-radius:50%;background:rgba(212,168,67,.15);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.marginal-info{flex:1}
.marginal-name{font-size:.73rem;font-weight:700;color:var(--text)}
.marginal-desc{font-size:.65rem;color:var(--muted)}
.marginal-roi{text-align:right}
.marginal-roi .val{font-size:.85rem;font-weight:800;color:var(--gold)}
.marginal-roi .lbl{font-size:.58rem;color:var(--muted)}
/* ── GRAFO ── */
.grafo-svg-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem;margin-top:.5rem;overflow:auto}
.grafo-svg-container svg{width:100%;min-height:380px}
/* ── EVIDENCE TABLE ── */
.quality-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.q-high{background:#19a06b} .q-med{background:#d4a843} .q-low{background:#e05252}
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.2rem;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-box h3{color:var(--gold);margin-bottom:.6rem;font-size:.85rem}
.modal-box input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.4rem;border-radius:6px;margin-bottom:.6rem}
.saved-scenario{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;margin-bottom:.3rem;display:flex;justify-content:space-between;align-items:center;font-size:.73rem;cursor:pointer}
.saved-scenario:hover{border-color:var(--teal)}
/* ── BOTTLENECK ── */
.bottleneck-alert{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.3);border-radius:8px;padding:.6rem .8rem;margin:.4rem 0;font-size:.7rem;color:var(--red)}
.bottleneck-alert strong{color:var(--gold-lt)}
/* ── STRUCTURE BAR ── */
.structure-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:.5rem 0}
.structure-seg{display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#fff}
/* ── PROJECTION ── */
.proyeccion-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem}
.proyeccion-controls label{font-size:.73rem;color:var(--muted)}
.calibracion-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin-bottom:.8rem}
.calibracion-box .result{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--teal);margin-top:.5rem;white-space:pre-wrap}
.supuestos-table{width:100%;border-collapse:collapse;font-size:.7rem;margin-top:.5rem}
.supuestos-table td,.supuestos-table th{padding:.3rem .5rem;border:1px solid var(--border)}
.supuestos-table td input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.15rem .3rem;border-radius:4px;font-size:.7rem}
/* ── RESPONSIVE ── */
@media(max-width:900px){.sidebar{width:100%;max-height:35vh}.main{flex-direction:column}.chart-row{grid-template-columns:1fr}.board-grid{grid-template-columns:1fr}}
@media print{body{background:#fff;color:#000}.sidebar,.topbar{display:none}.content{overflow:visible}}
body.presentation .topbar{display:none}body.presentation .sidebar{display:none}body.presentation .tabs{display:none}
body.presentation .kpi-card{padding:1.5rem}body.presentation .kpi-card .value{font-size:2.2rem}body.presentation .kpi-card .label{font-size:.85rem}
body.presentation .kpi-grid{grid-template-columns:repeat(4,1fr);gap:1.2rem}body.presentation .content{padding:2rem;background:var(--bg)}
</style>
</head>
<body>
<div class="layout">
<div class="topbar">
  <div class="brand"><span class="diamond">◆</span> PRISMA <small style="color:var(--muted);font-size:.6rem;font-weight:400">by GL Strategic</small></div>
  <span style="color:var(--muted);font-size:.7rem">Industria:</span>
  <select id="industrySelect"><option value="mineria">Minería</option><option value="clinica">Clínica Privada</option><option value="hospital">Hospital Público</option><option value="acuicola">Acuícola</option><option value="retail">Retail</option><option value="logistica">Logística</option><option value="telecom">Telecom</option><option value="agro">Agroindustria</option><option value="energia">Energía</option></select>
  <span style="color:var(--muted);font-size:.7rem">Empresa:</span>
  <select id="companySelect" style="min-width:150px"></select>
  <span style="color:var(--muted);font-size:.7rem">vs</span>
  <select id="companySelectB" style="min-width:130px" onchange="cargarEmpresaB(this.value)"><option value="">— Sin comparar —</option></select>
  <div class="separator"></div>
  <button onclick="runMontecarlo()">🎲 Montecarlo</button>
  <button onclick="exportarPDFNarrativo()" class="secondary">📄 PDF</button>
  <button id="anchorBtn" class="secondary" onclick="anchorBaseline()">📌 Anclar</button>
  <button onclick="abrirModalGuardar()" class="secondary">💾 Guardar</button>
  <button onclick="compartirURL()" class="secondary">🔗 Enlace</button>
  <button id="btnContextoAuto" onclick="actualizarContextoAuto()" class="secondary">🌐 Act.</button>
  <button id="presentationBtn" onclick="togglePresentation()">🎥 Presentar</button>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div id="scenarioSelector" style="margin-bottom:.6rem">
      <label style="font-size:.65rem;color:var(--muted);font-weight:700">Escenario rápido:</label>
      <select id="scenarioSelect" onchange="loadScenario(this.value)" style="width:100%;margin-top:.15rem"><option value="">— Personalizado —</option></select>
    </div>
    <div id="palancasContainer"></div>
    <div style="margin-top:.6rem"><button onclick="resetSliders()" class="secondary" style="width:100%">↺ Resetear</button></div>
  </div>
  <div class="content" id="content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('kpis')">📊 KPIs</button>
      <button class="tab" onclick="switchTab('boardroom')">💼 Boardroom</button>
      <button class="tab" onclick="switchTab('marginal')">📈 Marginal</button>
      <button class="tab" onclick="switchTab('grafo')">🔗 Grafo</button>
      <button class="tab" onclick="switchTab('escenarios')">📋 Escenarios</button>
      <button class="tab" onclick="switchTab('proyeccion')">📅 Proyección</button>
      <button class="tab" onclick="switchTab('evidencia')">📊 Evidencia</button>
      <button class="tab" onclick="switchTab('supuestos')">⚙️ Supuestos</button>
      <button class="tab" onclick="switchTab('calibracion')">🔧 Calibrar</button>
    </div>
    <div id="tab-kpis" class="tab-content active"><div class="kpi-grid" id="kpiContainer"></div><div class="chart-row"><div><canvas id="tornadoChart"></canvas></div><div><canvas id="impactChart"></canvas></div></div></div>
    <div id="tab-boardroom" class="tab-content"><div id="boardroomContent"></div></div>
    <div id="tab-marginal" class="tab-content"><div id="marginalContent"></div></div>
    <div id="tab-grafo" class="tab-content"><div class="grafo-svg-container" id="grafoContainer"></div></div>
    <div id="tab-escenarios" class="tab-content"><div id="escenariosContent"></div></div>
    <div id="tab-proyeccion" class="tab-content"><div class="proyeccion-controls"><label>Meses:</label><input type="range" id="mesesProy" min="6" max="24" value="12" step="6" onchange="document.getElementById('mesesProyVal').textContent=this.value;actualizarProyeccion()"><span id="mesesProyVal" style="color:var(--teal);font-weight:700">12</span></div><canvas id="proyeccionChart" style="max-height:300px"></canvas></div>
    <div id="tab-evidencia" class="tab-content"><div id="evidenciaContent"></div></div>
    <div id="tab-supuestos" class="tab-content"><div style="margin-bottom:.5rem"><button onclick="aplicarSupuestos()" class="secondary">✅ Aplicar</button><button onclick="resetSupuestos()" class="secondary">↺ Resetear</button></div><table class="supuestos-table" id="supuestosTable"></table></div>
    <div id="tab-calibracion" class="tab-content"><div class="calibracion-box"><p style="font-size:.7rem;color:var(--muted)">Cargue CSV: <strong>mes, [palancas], [kpi_resultado]</strong></p><input type="file" id="csvCalibrar" accept=".csv"><button onclick="calibrarDesdeCSV()" class="secondary" style="margin-left:.5rem">🔍 Analizar</button><div class="result" id="calResult"></div></div></div>
  </div>
</div>
<!-- MODAL -->
<div class="modal-overlay" id="modalGuardar"><div class="modal-box"><h3>💾 Escenarios guardados</h3><div style="display:flex;gap:.4rem;margin-bottom:.6rem"><input type="text" id="nombreEscenario" placeholder="Nombre" style="flex:1"><button onclick="guardarEscenario()">Guardar</button></div><div id="listaEscenarios" style="max-height:200px;overflow-y:auto;margin-bottom:.6rem"></div><button onclick="cerrarModalGuardar()" class="secondary">Cerrar</button></div></div>

<script>
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// 3. INDUSTRIAS EMBEBIDAS (9 industrias con fórmulas)

let industriaActual = null, perfilCliente = {}, perfilClienteB = {}, estadoActual = {}, estadoB = null,
    estadoAnclado = null, chartInst = null, tornadoChart = null, proyeccionChart = null, modoPresentacion = false;

function obtenerFormula(ind) {
  if (typeof ind.formulaPrincipal === 'function') return ind.formulaPrincipal;
  if (typeof ind.formulaPrincipal === 'string') {
    try { return eval('(' + ind.formulaPrincipal + ')'); }
    catch(e) { console.error(e); return () => ({}); }
  }
  return () => ({});
}
function simular(palancas) {
  if (!industriaActual) return {};
  const formula = obtenerFormula(industriaActual);
  const sup = {...(industriaActual.supuestos||{}), ...perfilCliente};
  try { return formula(palancas, sup, CTX); }
  catch(e) { console.error(e); return {}; }
}
function leerPalancas() {
  if (!industriaActual) return {};
  const p = {};
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const slider = document.getElementById('sl-'+n.id);
    p[n.id] = slider ? parseFloat(slider.value) : (industriaActual.initState[n.id]||0);
  });
  return p;
}
function actualizar() {
  const palancas = leerPalancas();
  estadoActual = simular(palancas);
  if (Object.keys(perfilClienteB).length > 0) {
    const formula = obtenerFormula(industriaActual);
    const supB = {...(industriaActual.supuestos||{}), ...perfilClienteB};
    try { estadoB = formula(palancas, supB, CTX); } catch(e) { estadoB = null; }
  } else { estadoB = null; }
  renderKPIs(); renderBoardroom(); renderMarginal(); renderEscenarios(); renderGrafo(); renderEvidencia();
}

function construirSidebar() {
  if (!industriaActual) return;
  const container = document.getElementById('palancasContainer');
  container.innerHTML = '';
  const drivers = (industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  drivers.forEach(n=>{
    const init = industriaActual.initState[n.id]||0;
    const elast = n.elasticidad || 0;
    const min = init * 0.5, max = init * 1.5;
    const div = document.createElement('div'); div.className='palanca';
    div.innerHTML=`<label><span>${n.label}</span><span id="val-${n.id}" style="font-size:.7rem;color:var(--teal)">${new Intl.NumberFormat('es-CL',{maximumFractionDigits:2}).format(init)}</span></label>
      <input type="range" id="sl-${n.id}" min="${min}" max="${max}" value="${init}" step="${(max-min)/200}">
      <div class="range-labels"><span>${min.toFixed(1)}</span><span>${max.toFixed(1)}</span></div>`;
    container.appendChild(div);
    document.getElementById('sl-'+n.id).addEventListener('input', ()=>{
      const s=document.getElementById('sl-'+n.id), v=document.getElementById('val-'+n.id);
      if(s&&v) v.textContent = new Intl.NumberFormat('es-CL',{maximumFractionDigits:2}).format(parseFloat(s.value));
      actualizar();
    });
  });
  const sel=document.getElementById('scenarioSelect');
  sel.innerHTML='<option value="">— Personalizado —</option>';
  (industriaActual.escenarios||[]).forEach((esc,i)=>{
    const opt=document.createElement('option'); opt.value=i; opt.textContent=esc.nombre; sel.appendChild(opt);
  });
}
function poblarEmpresas() {
  const key = document.getElementById('industrySelect').value;
  const sel = document.getElementById('companySelect');
  sel.innerHTML = '';
  const companies = COMPANIES[key]||[];
  companies.forEach(c=>sel.appendChild(new Option(c.nombre, c.id)));
  const selB = document.getElementById('companySelectB');
  selB.innerHTML = '<option value="">— Sin comparar —</option>';
  companies.forEach(c=>selB.appendChild(new Option(c.nombre, c.id)));
  if (companies.length>0) cargarEmpresa(companies[0].id);
}
function cargarEmpresa(id) {
  const key = document.getElementById('industrySelect').value;
  const company = (COMPANIES[key]||[]).find(c=>c.id===id);
  if (!company) return;
  if (EMBEDDED_INDUSTRIES[key]) {
    const ind = JSON.parse(JSON.stringify(EMBEDDED_INDUSTRIES[key]));
    if (typeof ind.formulaPrincipal==='string') ind.formulaPrincipal=eval('('+ind.formulaPrincipal+')');
    industriaActual = ind;
  }
  perfilCliente = {...(company.perfil||{})};
  construirSidebar();
  Object.entries(company.perfil||{}).forEach(([k,v])=>{
    const sl=document.getElementById('sl-'+k), vl=document.getElementById('val-'+k);
    if(sl){sl.value=v; if(vl)vl.textContent = new Intl.NumberFormat('es-CL',{maximumFractionDigits:2}).format(v);}
  });
  actualizar();
}
function cargarEmpresaB(id) {
  if (!id) { perfilClienteB={}; estadoB=null; actualizar(); return; }
  const key = document.getElementById('industrySelect').value;
  const company = (COMPANIES[key]||[]).find(c=>c.id===id);
  if (!company) return;
  perfilClienteB = {...(company.perfil||{})};
  actualizar();
}
function loadScenario(idx) {
  if (!industriaActual||idx==='') return;
  const esc = industriaActual.escenarios[parseInt(idx)];
  if (!esc) return;
  Object.entries(esc.palancas).forEach(([id,val])=>{
    const sl=document.getElementById('sl-'+id), vl=document.getElementById('val-'+id);
    if(sl){sl.value=val; if(vl)vl.textContent = new Intl.NumberFormat('es-CL',{maximumFractionDigits:2}).format(val);}
  });
  actualizar();
}
function resetSliders() {
  if (!industriaActual) return;
  Object.entries(industriaActual.initState||{}).forEach(([id,val])=>{
    const sl=document.getElementById('sl-'+id), vl=document.getElementById('val-'+id);
    if(sl){sl.value=val; if(vl)vl.textContent = new Intl.NumberFormat('es-CL',{maximumFractionDigits:2}).format(val);}
  });
  actualizar();
}

function renderKPIs() {
  const container = document.getElementById('kpiContainer');
  if (!industriaActual) return;
  container.innerHTML='';
  const fmtNum = new Intl.NumberFormat('es-CL', { maximumFractionDigits: 0 });
  const fmtDec = new Intl.NumberFormat('es-CL', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  const fmtDin = new Intl.NumberFormat('es-CL', { maximumFractionDigits: 0 });
  (industriaActual.kpis||[]).forEach(kpi=>{
    const val = estadoActual[kpi.id]!==undefined ? estadoActual[kpi.id] : 0;
    let f;
    if (kpi.formato==='dinero') f='$'+fmtDin.format(val)+' M';
    else if (kpi.formato==='porcentaje') f=fmtDec.format(val)+'%';
    else f=fmtNum.format(val);
    let fB='';
    if (estadoB && estadoB[kpi.id]!==undefined) {
      const vb=estadoB[kpi.id];
      if (kpi.formato==='dinero') fB='$'+fmtDin.format(vb)+' M';
      else fB=fmtNum.format(vb);
    }
    let semaforo='<span class="semaforo verde"></span>';
    const base=kpi.base||1;
    const pct=(val-base)/Math.abs(base)*100;
    if (pct<-15) semaforo='<span class="semaforo rojo"></span>';
    else if (pct<-5) semaforo='<span class="semaforo amarillo"></span>';
    const color=kpi.id.includes('ebitda')||kpi.id.includes('margen')?'gold':kpi.id.includes('costo')||kpi.id.includes('deficit')?'red':'teal';
    const card=document.createElement('div'); card.className='kpi-card';
    card.innerHTML=`<div class="label">${semaforo}${kpi.label}</div><div class="value ${color}">${f}</div>${fB?`<div style="font-size:.65rem;color:var(--blue)">vs ${fB}</div>`:''}<div class="sub">${kpi.unidades}</div>`;
    container.appendChild(card);
  });
  renderImpactChart();
  renderTornadoChart();
}

function renderImpactChart() {
  if (chartInst) chartInst.destroy();
  const canvas=document.getElementById('impactChart');
  if (!canvas||!industriaActual) return;
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato!=='info');
  chartInst=new Chart(canvas.getContext('2d'),{
    type:'bar',data:{labels:kpisNum.map(k=>k.label),datasets:[{data:kpisNum.map(k=>estadoActual[k.id]||0),backgroundColor:kpisNum.map(k=>k.id.includes('ebitda')||k.id.includes('margen')?'#d4a843':'#3a8fe0'),borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},title:{display:true,text:'KPIs Actuales',color:'#e4e9f2',font:{size:12}}},scales:{y:{ticks:{color:'#6b7a92'}},x:{ticks:{color:'#6b7a92',font:{size:10}}}}}
  });
}

function renderTornadoChart() {
  if (tornadoChart) tornadoChart.destroy();
  const canvas=document.getElementById('tornadoChart');
  if (!canvas||!industriaActual) return;
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const impacts=drivers.map(d=>{
    const init=industriaActual.initState[d.id]||0;
    const val=estadoActual[d.id]||init;
    const elast=d.elasticidad||0;
    const delta=(val-init)/init*100*Math.abs(elast);
    return {label:d.label,delta:elast>=0?delta:-delta};
  }).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  tornadoChart=new Chart(canvas.getContext('2d'),{
    type:'bar',data:{labels:impacts.map(i=>i.label),datasets:[{data:impacts.map(i=>i.delta),backgroundColor:impacts.map(i=>i.delta>=0?'rgba(0,168,157,.7)':'rgba(224,82,82,.7)'),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},title:{display:true,text:'Impacto Marginal (%)',color:'#e4e9f2',font:{size:12}}},scales:{x:{ticks:{color:'#6b7a92',callback:v=>v+'%'}},y:{ticks:{color:'#6b7a92',font:{size:10}}}}}
  });
}

function renderMarginal() {
  const container=document.getElementById('marginalContent');

  svg+='<marker id="arrowPos" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#06d6a0"/></marker><marker id="arrowNeg" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#ee5a6f"/></marker></defs>';
  const pos={};
  ['driver','intermedio','resultado'].forEach(tipo=>{
    const arr=nodos.filter(n=>n.tipo===tipo);const c=colColor[tipo];
    arr.forEach((n,i)=>{const y=45+i*90,x=colX[tipo],w=155,h=78;pos[n.id]={x:x+w/2,y:y+h/2,x1:x,y1:y,w,h};
      const icono=iconos[n.id]||'📌';const val=estadoActual[n.id]!==undefined?estadoActual[n.id]:'-';
      const fmt=new Intl.NumberFormat('es-CL',{maximumFractionDigits:0});const valStr=typeof val==='number'?fmt.format(val):val;
      svg+=`<g filter="url(#glow_${tipo})"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="#121e2e" stroke="${c.stroke}" stroke-width="1.5"/><rect x="${x+1}" y="${y+1}" width="${w-2}" height="3" rx="1.5" fill="${c.stroke}" opacity="0.6"/><text x="${x+14}" y="${y+28}" font-size="16">${icono}</text><text x="${x+36}" y="${y+28}" font-size="11" font-weight="600" fill="${c.label}">${n.label}</text><text x="${x+14}" y="${y+56}" font-size="16" font-weight="700" fill="#dce8f2" font-family="Space Mono,monospace">${valStr}</text><text x="${x+14}" y="${y+70}" font-size="10" fill="#6b849e">${n.unidades||''}</text></g>`;
    });
  });
  arcos.forEach(a=>{const o=pos[a.origen],d=pos[a.destino];if(!o||!d)return;const color=a.polaridad==='positivo'?'#06d6a0':'#ee5a6f';const marker=a.polaridad==='positivo'?'url(#arrowPos)':'url(#arrowNeg)';const mx=(o.x+d.x)/2;const x1=o.x1+o.w,y1=o.y,x2=d.x1,y2=d.y;svg+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="${color}" stroke-width="2" fill="none" marker-end="${marker}" opacity="0.7"/>`;});
  svg+='</svg>';container.innerHTML=svg;
}

function renderEvidencia() {
  const container=document.getElementById('evidenciaContent');
  if (!industriaActual) return;
  let html='<h3 style="color:var(--gold);margin-bottom:.6rem">📊 Calidad de Datos y Fuentes</h3><table class="data-table"><thead><tr><th>Variable</th><th>Calidad</th><th>Fuente</th><th>Última actualización</th></tr></thead><tbody>';
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  drivers.forEach(d=>{
    const elast=Math.abs(d.elasticidad||0);
    const calidad=elast>0.7?'<span class="quality-dot q-high"></span> Alta':elast>0.4?'<span class="quality-dot q-med"></span> Media':'<span class="quality-dot q-low"></span> Baja';
    html+=`<tr><td>${d.label}</td><td>${calidad}</td><td class="td-mono">Industria (benchmark)</td><td class="td-mono">${new Date().toLocaleDateString('es-CL')}</td></tr>`;
  });
  html+='</tbody></table>';
  container.innerHTML=html;
}

function runMontecarlo() {
  if (!industriaActual) return;
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const resultados=[];
  for (let i=0;i<300;i++) {
    const pal={};
    drivers.forEach(n=>{const base=estadoActual[n.id]||industriaActual.initState[n.id]||0;pal[n.id]=base*(0.8+Math.random()*0.4);});
    const res=simular(pal);
    const kr=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen')||k.id.includes('deficit'));
    if (kr) resultados.push(res[kr.id]||0);
  }
  if (!resultados.length) return;
  const sorted=[...resultados].sort((a,b)=>a-b);
  const p10=sorted[Math.floor(300*.1)],p50=sorted[Math.floor(300*.5)],p90=sorted[Math.floor(300*.9)];
  const bins={};resultados.forEach(v=>{const k=Math.round(v);bins[k]=(bins[k]||0)+1;});
  const labels=Object.keys(bins).sort((a,b)=>a-b),data=labels.map(l=>bins[l]);
  if (chartInst) chartInst.destroy();
  const canvas=document.getElementById('impactChart');
  chartInst=new Chart(canvas.getContext('2d'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#d4a843',borderRadius:4}]},
    options:{responsive:true,plugins:{title:{display:true,text:`P10=${p10.toFixed(1)} | P50=${p50.toFixed(1)} | P90=${p90.toFixed(1)}`,color:'#e4e9f2'},legend:{display:false}}}});
}
function exportarPDFNarrativo() {
  if (!industriaActual||!estadoActual) return;
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});let y=20;
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(0,168,157);doc.text('PRISMA · Informe Ejecutivo',20,y);y+=12;
  doc.setFontSize(12);doc.setTextColor(100);doc.text(industriaActual.nombre,20,y);y+=10;
  doc.setFontSize(10);doc.text('Generado: '+new Date().toLocaleString('es-CL'),20,y);y+=12;
  (industriaActual.kpis||[]).slice(0,6).forEach(kpi=>{const val=estadoActual[kpi.id]||0;doc.setFontSize(9);doc.text(`${kpi.label}: ${val.toFixed(1)} ${kpi.unidades}`,25,y);y+=5;});
  y+=5;doc.save('informe_prisma.pdf');
}
function anchorBaseline(){estadoAnclado={...estadoActual};actualizar();}
function togglePresentation(){modoPresentacion=!modoPresentacion;document.body.classList.toggle('presentation',modoPresentacion);}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const map={kpis:'tab-kpis',boardroom:'tab-boardroom',marginal:'tab-marginal',grafo:'tab-grafo',escenarios:'tab-escenarios',proyeccion:'tab-proyeccion',evidencia:'tab-evidencia',supuestos:'tab-supuestos',calibracion:'tab-calibracion'};
  document.getElementById(map[tab]).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>{if(Object.keys(map)[i]===tab)t.classList.add('active');});
  if(tab==='grafo')renderGrafo();if(tab==='escenarios')renderEscenarios();
  if(tab==='proyeccion')actualizarProyeccion();if(tab==='evidencia')renderEvidencia();
  if(tab==='supuestos')renderSupuestos();if(tab==='marginal')renderMarginal();
}
function actualizarProyeccion() {
  if (!industriaActual) return;
  const meses=parseInt(document.getElementById('mesesProy').value)||12;
  const palBase=leerPalancas();const supBase={...(industriaActual.supuestos||{}),...perfilCliente};
  const formula=obtenerFormula(industriaActual);const proy=[];
  for(let m=0;m<=meses;m++){const pal={};Object.entries(palBase).forEach(([k,v])=>{const n=(industriaActual.nodos||[]).find(x=>x.id===k);pal[k]=v*(1+(n?.elasticidad||0)*0.004*m);});try{proy.push(formula(pal,supBase,CTX));}catch(e){proy.push({});}}
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen')||k.id.includes('deficit'));
  if(!kpiRes)return;
  const labels=Array.from({length:meses+1},(_,i)=>'M'+(i+1)),data=proy.map(p=>p[kpiRes.id]||0);
  if(proyeccionChart)proyeccionChart.destroy();
  const canvas=document.getElementById('proyeccionChart');
  proyeccionChart=new Chart(canvas.getContext('2d'),{type:'line',data:{labels,datasets:[{label:kpiRes.label+' proyectado',data,borderColor:'#d4a843',backgroundColor:'rgba(212,168,67,.1)',fill:true,tension:.3,pointRadius:3}]},
    options:{responsive:true,plugins:{title:{display:true,text:`Proyección a ${meses} meses`,color:'#e4e9f2'}},scales:{y:{ticks:{color:'#6b7a92'}},x:{ticks:{color:'#6b7a92'}}}}});
}
function renderSupuestos(){const t=document.getElementById('supuestosTable');if(!industriaActual||!industriaActual.supuestos)return;const s={...(industriaActual.supuestos||{}),...perfilCliente};let h='<thead><tr><th>Parámetro</th><th>Valor</th></tr></thead><tbody>';Object.entries(s).forEach(([k,v])=>h+=`<tr><td>${k}</td><td><input id="sup-${k}" value="${v}" type="number" step="any"></td></tr>`);h+='</tbody>';t.innerHTML=h;}
function aplicarSupuestos(){if(!industriaActual)return;Object.keys(industriaActual.supuestos||{}).forEach(k=>{const i=document.getElementById('sup-'+k);if(i)perfilCliente[k]=parseFloat(i.value);});actualizar();renderSupuestos();}
function resetSupuestos(){perfilCliente={};actualizar();renderSupuestos();}
function calibrarDesdeCSV(){alert('Sube un CSV con columnas: mes, [palancas], [kpi_resultado] para calibrar las elasticidades.');}
function actualizarContextoAuto(){fetch('https://mindicador.cl/api').then(r=>r.json()).then(d=>{if(d.dolar)CTX.dolar_clp=Math.round(d.dolar.valor);if(d.uf)CTX.uf_clp=Math.round(d.uf.valor);actualizar();alert('✅ Contexto actualizado');}).catch(()=>alert('❌ Error'));}
function abrirModalGuardar(){document.getElementById('modalGuardar').classList.add('active');}
function cerrarModalGuardar(){document.getElementById('modalGuardar').classList.remove('active');}
function guardarEscenario(){const n=document.getElementById('nombreEscenario').value.trim();if(!n)return alert('Nombre requerido');const k='esc_'+n.replace(/\s+/g,'_');localStorage.setItem(k,JSON.stringify({nombre:n,ind:document.getElementById('industrySelect').value,emp:document.getElementById('companySelect').value,palancas:leerPalancas(),fecha:new Date().toISOString()}));cerrarModalGuardar();alert('✅ Guardado: '+n);}
function compartirURL(){const p=leerPalancas();const u=new URLSearchParams();u.set('ind',document.getElementById('industrySelect').value);u.set('emp',document.getElementById('companySelect').value);Object.entries(p).forEach(([k,v])=>u.set(k,v.toFixed(2)));const url=window.location.origin+window.location.pathname+'?'+u.toString();navigator.clipboard.writeText(url).then(()=>alert('🔗 Enlace copiado'));}
