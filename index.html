<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISMA · by GL Strategic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#06090e;--surface:#0c1118;--panel:#111922;--card:#141e2b;--border:#1e2d3f;--text:#e2e9f3;--muted:#6b809b;--teal:#00a89d;--gold:#c9a84c;--blue:#378add;--red:#e05252}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
.topbar{background:linear-gradient(135deg,#0c1118,#111922);border-bottom:1px solid var(--border);padding:.4rem 1rem;min-height:48px;display:flex;align-items:center;gap:.6rem;flex-shrink:0;flex-wrap:wrap}
.brand{font-weight:800;font-size:.9rem;color:var(--gold)}
.topbar select,button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.3rem .6rem;border-radius:5px;font-size:.75rem;cursor:pointer}
button{background:var(--teal);color:#000;font-weight:700;border:none}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);padding:.6rem;overflow-y:auto}
.content{flex:1;padding:.6rem;overflow-y:auto}
.palanca{margin-bottom:.5rem}
.palanca label{display:flex;justify-content:space-between;font-size:.7rem;font-weight:600;color:var(--muted)}
.palanca input{width:100%;margin-top:.1rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.4rem;margin-bottom:.5rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.5rem;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-card .label{font-size:.6rem;color:var(--muted);text-transform:uppercase}
.kpi-card .value{font-size:1.1rem;font-weight:800;margin:.1rem 0}
.kpi-card .sub{font-size:.55rem;color:var(--muted)}
.tabs{display:flex;gap:.3rem;margin-bottom:.5rem;flex-wrap:wrap}
.tab{padding:.25rem .6rem;border-radius:4px;cursor:pointer;font-size:.7rem;background:var(--panel);border:1px solid var(--border);color:var(--muted)}
.tab.active{background:var(--teal);color:#000;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
canvas{max-height:250px;margin-top:.3rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.board-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.exec-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;margin-bottom:.5rem}
.rec-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:.6rem;margin-bottom:.4rem}
.rec-box.warn{border-left-color:var(--gold)}
.rec-title{font-size:.7rem;font-weight:700;color:var(--teal);margin-bottom:.2rem}
.rec-desc{font-size:.65rem;color:var(--muted);line-height:1.5}
.grafo-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.4rem;overflow:auto}
.grafo-container svg{width:100%;min-height:350px}
.data-table{width:100%;border-collapse:collapse;font-size:.65rem;margin-top:.3rem}
.data-table th{text-align:left;padding:.3rem .5rem;font-size:.58rem;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
.data-table td{padding:.3rem .5rem;border-bottom:1px solid var(--border)}
@media(max-width:900px){.sidebar{width:100%;max-height:30vh}.main{flex-direction:column}.chart-row,.board-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">◆ PRISMA <small style="color:var(--muted);font-size:.55rem">by GL Strategic</small></div>
  <span style="color:var(--muted);font-size:.65rem">Industria:</span>
  <select id="indSel"><option value="acuicola">Acuícola</option><option value="mineria">Minería</option><option value="clinica">Clínica Privada</option><option value="hospital">Hospital Público</option><option value="retail">Retail</option><option value="logistica">Logística</option><option value="telecom">Telecom</option><option value="agro">Agroindustria</option><option value="energia">Energía</option></select>

  <select id="empSel" style="min-width:140px"></select>
  <button onclick="anchorBase()">📌 Anclar</button>
  <button onclick="runMC()">🎲 Montecarlo</button>

</div>

let industriaActual=null,perfilCliente={},estadoActual={},estadoBase={},chartInst=null,tornadoInst=null;

function obtenerFormula(ind){if(typeof ind.formulaPrincipal==='function')return ind.formulaPrincipal;try{return eval('('+ind.formulaPrincipal+')');}catch(e){return()=>({});}}
function simular(palancas){const f=obtenerFormula(industriaActual);const s={...(industriaActual.supuestos||{}),...perfilCliente};try{return f(palancas,s,CTX);}catch(e){return{};}}
function leerPalancas(){const p={};(industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{const sl=document.getElementById('sl-'+n.id);p[n.id]=sl?parseFloat(sl.value):(industriaActual.initState[n.id]||0);});return p;}
function actualizar(){estadoActual=simular(leerPalancas());renderAll();}

function construirSidebar(){
  const c=document.getElementById('palancasContainer');c.innerHTML='';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const init=industriaActual.initState[n.id]||0,min=init*0.5,max=init*1.5;
    const d=document.createElement('div');d.className='palanca';
    d.innerHTML=`<label><span>${n.icon||''} ${n.label}</span><span id="val-${n.id}" style="font-size:.65rem;color:var(--teal)">${init.toFixed(2)}</span></label><input type="range" id="sl-${n.id}" min="${min}" max="${max}" value="${init}" step="${(max-min)/200}">`;
    c.appendChild(d);
    document.getElementById('sl-'+n.id).addEventListener('input',()=>{const s=document.getElementById('sl-'+n.id),v=document.getElementById('val-'+n.id);if(s&&v)v.textContent=parseFloat(s.value).toFixed(2);actualizar();});
  });
  const sel=document.getElementById('scenarioSel');sel.innerHTML='<option value="">— Personalizado —</option>';
  (industriaActual.escenarios||[]).forEach((esc,i)=>{const o=document.createElement('option');o.value=i;o.textContent=esc.nombre;sel.appendChild(o);});
}
function poblarEmpresas(){
  const key=document.getElementById('indSel').value;
  const sel=document.getElementById('empSel');sel.innerHTML='';
  (COMPANIES[key]||[]).forEach(c=>sel.appendChild(new Option(c.nombre,c.id)));
  if((COMPANIES[key]||[]).length>0)cargarEmpresa(COMPANIES[key][0].id);
}
function cargarEmpresa(id){
  const key=document.getElementById('indSel').value;
  const company=(COMPANIES[key]||[]).find(c=>c.id===id);
  if(!company)return;
  if(IND[key]){const ind=JSON.parse(JSON.stringify(IND[key]));if(typeof ind.formulaPrincipal==='string')ind.formulaPrincipal=eval('('+ind.formulaPrincipal+')');industriaActual=ind;}
  perfilCliente={...(company.perfil||{})};
  construirSidebar();
  Object.entries(company.perfil||{}).forEach(([k,v])=>{const sl=document.getElementById('sl-'+k);if(sl){sl.value=v;const vl=document.getElementById('val-'+k);if(vl)vl.textContent=v.toFixed(2);}});
  estadoBase=simular(leerPalancas());
  actualizar();
}
function loadScn(idx){if(!industriaActual||idx==='')return;const esc=industriaActual.escenarios[parseInt(idx)];if(!esc)return;Object.entries(esc.palancas).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}
function resetSliders(){if(!industriaActual)return;Object.entries(industriaActual.initState||{}).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}
function anchorBase(){estadoBase={...estadoActual};renderBoardroom();}

// ═══════════════════════════════════════════════════
// FORMATEO DE NÚMEROS (separadores de miles)
// ═══════════════════════════════════════════════════
function fmt(val,f){
  const num=Number(val);
  if(f==='usdM')return '$'+new Intl.NumberFormat('es-CL',{maximumFractionDigits:1}).format(num)+'M';
  if(f==='usd2')return '$'+num.toFixed(2);
  if(f==='pct')return num.toFixed(1)+'%';
  if(f==='num2')return num.toFixed(2);
  if(f==='num1')return num.toFixed(1);
  if(f==='num')return new Intl.NumberFormat('es-CL',{maximumFractionDigits:0}).format(num);
  return new Intl.NumberFormat('es-CL',{maximumFractionDigits:0}).format(num);
}

function renderKPIs(){
  const c=document.getElementById('kpiContainer');if(!industriaActual)return;c.innerHTML='';
  (industriaActual.kpis||[]).forEach(kpi=>{
    const val=estadoActual[kpi.id]!==undefined?estadoActual[kpi.id]:0;
    const base=kpi.base||0;const pct=base>0?(val-base)/Math.abs(base)*100:0;
    let sem='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;background:#1d9e75;box-shadow:0 0 5px #1d9e75"></span>';
    if(pct<-15)sem='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;background:#e05252;box-shadow:0 0 5px #e05252"></span>';
    else if(pct<-5)sem='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;background:#c9a84c;box-shadow:0 0 5px #c9a84c"></span>';
    const color=kpi.id.includes('ebitda')||kpi.id.includes('margen')?'gold':kpi.id.includes('costo')||kpi.id.includes('deficit')?'red':'teal';
    const card=document.createElement('div');card.className='kpi-card';
    card.style.cssText='position:relative;overflow:hidden';
    card.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+(pct<-10?'var(--red)':pct<0?'var(--gold)':'var(--teal)')+'"></div><div class="label">${sem}${kpi.label}</div><div class="value" style="color:var(--${color})">${fmt(val,kpi.formato)}</div><div class="sub">${kpi.unidades||''}</div>`;
    c.appendChild(card);
  });
  renderCharts();
}
function renderCharts(){
  if(chartInst)chartInst.destroy();if(tornadoInst)tornadoInst.destroy();
  const c1=document.getElementById('impactChart'),c2=document.getElementById('tornadoChart');
  if(!c1||!c2||!industriaActual)return;
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato);
  chartInst=new Chart(c1.getContext('2d'),{type:'bar',data:{labels:kpisNum.map(k=>k.label),datasets:[{data:kpisNum.map(k=>estadoActual[k.id]||0),backgroundColor:kpisNum.map(k=>k.id.includes('ebitda')?'rgba(201,168,76,.8)':'rgba(55,138,221,.7)'),borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#6b809b'}},x:{ticks:{color:'#6b809b'}}}}});
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const impacts=drivers.map(d=>{const init=industriaActual.initState[d.id]||0,val=estadoActual[d.id]||init,elast=d.elasticidad||0;return{label:d.label,delta:elast>=0?Math.abs(elast)*3:-Math.abs(elast)*3}}).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  tornadoInst=new Chart(c2.getContext('2d'),{type:'bar',data:{labels:impacts.map(i=>i.label),datasets:[{data:impacts.map(i=>i.delta),backgroundColor:impacts.map(i=>i.delta>=0?'rgba(0,168,157,.7)':'rgba(224,82,82,.7)'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b809b'}},y:{ticks:{color:'#6b809b'}}}}});
}
function renderBoardroom(){
  const c=document.getElementById('boardroomContent');if(!industriaActual)return;
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));
  const ebitda=kpiRes?estadoActual[kpiRes.id]||0:0;
  const ebitdaBase=estadoBase[kpiRes?.id]||ebitda;
  const delta=ebitda-ebitdaBase;
  let html='<div class="board-grid"><div><div class="exec-box"><div style="font-size:.8rem;font-weight:700;color:var(--gold);margin-bottom:.3rem">'+industriaActual.nombre+'</div><div style="font-size:.7rem;color:var(--muted);line-height:1.5">';
  if(kpiRes)html+='<strong>'+kpiRes.label+':</strong> <span style="color:var(--gold)">'+fmt(ebitda,kpiRes.formato)+'</span> | ';
  if(delta!==0)html+='Δ vs Base: <span style="color:'+(delta>=0?'var(--teal)':'var(--red)')+'">'+(delta>=0?'+':'')+fmt(delta,kpiRes?.formato||'num')+'</span>';
  html+='</div></div>';
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const top=drivers.map(d=>({label:d.label,init:industriaActual.initState[d.id]||0,val:estadoActual[d.id]||0,elast:d.elasticidad||0})).sort((a,b)=>Math.abs((b.val-b.init)/b.init*b.elast)-Math.abs((a.val-a.init)/a.init*a.elast))[0];
  if(top)html+='<div class="rec-box"><div class="rec-title">🔍 Mayor Impacto: '+top.label+'</div><div class="rec-desc">Variación de ±1% impacta el resultado en <strong>$'+Math.abs(top.elast*0.4).toFixed(2)+'M</strong>.</div></div>';
  html+='</div><div>';(industriaActual.cadenas||[]).slice(0,2).forEach(cd=>{html+='<div class="rec-box '+(cd.polaridad==='negativo'?'warn':'')+'"><div class="rec-title">'+(cd.polaridad==='negativo'?'⚠️ ':'✅ ')+cd.nombre+'</div><div class="rec-desc"><strong>Causa:</strong> '+cd.causa+'<br><strong>Impacto:</strong> '+cd.impacto+'<br><strong>Acción:</strong> '+cd.accion+' | Horizonte: '+cd.horizonte+'</div></div>';});
  html+='</div></div>';c.innerHTML=html;
}
function renderGrafo(){
  const container=document.getElementById('grafoContainer');if(!industriaActual||!industriaActual.nodos){container.innerHTML='';return;}
  const nodos=industriaActual.nodos;const arcos=industriaActual.arcos||[];
  const colX={driver:30,intermedio:340,resultado:640};
  const colColor={driver:{stroke:'#3a7bd5',glow:'#3a7bd5',label:'#3a7bd5'},intermedio:{stroke:'#f0a04b',glow:'#f0a04b',label:'#f0a04b'},resultado:{stroke:'#c9a84c',glow:'#c9a84c',label:'#c9a84c'}};

  svg+='<marker id="arrowPos" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#06d6a0"/></marker><marker id="arrowNeg" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#e05252"/></marker></defs>';
  const pos={};
  ['driver','intermedio','resultado'].forEach(tipo=>{
    const arr=nodos.filter(n=>n.tipo===tipo);const cl=colColor[tipo];
    arr.forEach((n,i)=>{
      const y=45+i*90,x=colX[tipo],w=150,h=75;pos[n.id]={x:x+w/2,y:y+h/2,x1:x,y1:y,w,h};
      const val=estadoActual[n.id]!==undefined?estadoActual[n.id]:'-';
      const valStr=typeof val==='number'?(val>=1000?new Intl.NumberFormat('es-CL',{maximumFractionDigits:0}).format(val):val.toFixed(2)):val;
      svg+=`<g filter="url(#glow_${tipo})"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="#111922" stroke="${cl.stroke}" stroke-width="1.5"/><rect x="${x+2}" y="${y+2}" width="${w-4}" height="3" rx="1.5" fill="${cl.stroke}" opacity="0.6"/><text x="${x+10}" y="${y+26}" font-size="15">${n.icon||'📌'}</text><text x="${x+30}" y="${y+26}" font-size="11" font-weight="600" fill="${cl.label}">${n.label}</text><text x="${x+10}" y="${y+54}" font-size="15" font-weight="700" fill="#e2e9f3">${valStr}</text><text x="${x+10}" y="${y+70}" font-size="10" fill="#6b809b">${n.unidades||''}</text></g>`;
    });
  });
  arcos.forEach(a=>{const o=pos[a.origen],d=pos[a.destino];if(!o||!d)return;const color=a.polaridad==='positivo'?'#06d6a0':'#e05252';const marker=a.polaridad==='positivo'?'url(#arrowPos)':'url(#arrowNeg)';const mx=(o.x+d.x)/2;const x1=o.x1+o.w,y1=o.y,x2=d.x1,y2=d.y;svg+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="${color}" stroke-width="2" fill="none" marker-end="${marker}" opacity="0.7"/>`;});
  svg+='</svg>';container.innerHTML=svg;
}
function renderEscenarios(){
  const c=document.getElementById('escenariosContent');if(!industriaActual)return;
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));
  let html='<h3 style="color:var(--gold);margin-bottom:.4rem">📋 Comparativa de Escenarios</h3><table class="data-table"><thead><tr><th>Escenario</th>';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<th>${d.label}</th>`);
  if(kpiRes)html+=`<th>${kpiRes.label}</th>`;html+='</tr></thead><tbody>';
  (industriaActual.escenarios||[]).forEach(esc=>{
    html+=`<tr><td style="font-weight:700;color:var(--gold)">${esc.nombre}</td>`;
    (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<td>${esc.palancas[d.id]||'-'}</td>`);
    if(kpiRes){const sup={...(industriaActual.supuestos||{}),...perfilCliente};try{const f=obtenerFormula(industriaActual);const r=f(esc.palancas,sup,CTX);html+=`<td style="font-weight:700;color:${(r[kpiRes.id]||0)>(estadoActual[kpiRes.id]||0)?'var(--teal)':'var(--red)'}">${fmt(r[kpiRes.id]||0,kpiRes.formato)}</td>`;}catch(e){html+='<td>—</td>';}}
    html+='</tr>';
  });
  html+='</tbody></table>';c.innerHTML=html;
}
function runMC(){
  if(!industriaActual)return;const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');const res=[];for(let i=0;i<500;i++){const pal={};drivers.forEach(n=>{const base=estadoActual[n.id]||industriaActual.initState[n.id]||0;pal[n.id]=base*(0.8+Math.random()*0.4);});const r=simular(pal);const kr=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda')||k.id.includes('margen'));if(kr)res.push(r[kr.id]||0);}
  if(!res.length)return;const sorted=[...res].sort((a,b)=>a-b);const p10=sorted[50],p50=sorted[250],p90=sorted[450];const bins={};res.forEach(v=>{const k=Math.round(v);bins[k]=(bins[k]||0)+1;});const labels=Object.keys(bins).sort((a,b)=>a-b),data=labels.map(l=>bins[l]);
  if(chartInst)chartInst.destroy();const canvas=document.getElementById('impactChart');
  chartInst=new Chart(canvas.getContext('2d'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#c9a84c',borderRadius:3}]},options:{responsive:true,plugins:{title:{display:true,text:`P10: ${fmt(p10,'usdM')} | P50: ${fmt(p50,'usdM')} | P90: ${fmt(p90,'usdM')}`,color:'#e2e9f3'},legend:{display:false}},scales:{y:{ticks:{color:'#6b809b'}},x:{ticks:{color:'#6b809b'}}}}});
}
function renderAll(){renderKPIs();renderBoardroom();renderGrafo();renderEscenarios();}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const map={kpis:'tab-kpis',boardroom:'tab-boardroom',grafo:'tab-grafo',escenarios:'tab-escenarios'};
  document.getElementById(map[tab]).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>{if(Object.keys(map)[i]===tab)t.classList.add('active');});
  if(tab==='grafo')renderGrafo();if(tab==='escenarios')renderEscenarios();if(tab==='boardroom')renderBoardroom();
}
document.getElementById('indSel').addEventListener('change',poblarEmpresas);
document.getElementById('empSel').addEventListener('change',function(){cargarEmpresa(this.value);});
window.addEventListener('load',()=>{poblarEmpresas();});
</script>
