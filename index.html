<!DOCTYPE html>
<html lang="es">
<head>

<title>PRISMA · by GL Strategic</title>

<style>
:root{--bg:#06090e;--surface:#0c1118;--panel:#111922;--card:#141e2b;--border:#1e2d3f;--text:#e2e9f3;--muted:#6b809b;--teal:#00a89d;--gold:#c9a84c;--gold-lt:#e8c97a;--blue:#378add;--red:#e05252;--warn:#c9a84c;--purple:#8b5cf6;--green:#1d9e75}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
.topbar{background:linear-gradient(135deg,#0c1118,#111922);border-bottom:1px solid var(--border);padding:.4rem 1.2rem;min-height:50px;display:flex;align-items:center;gap:.7rem;flex-shrink:0;flex-wrap:wrap}
.brand{font-weight:800;font-size:.92rem;color:var(--gold);white-space:nowrap;display:flex;align-items:center;gap:.4rem}
.brand .diamond{color:var(--teal);font-size:1.1rem}
.topbar select,button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.3rem .6rem;border-radius:6px;font-size:.75rem;cursor:pointer}
button{background:var(--teal);color:#000;font-weight:700;border:none}
button.secondary{background:transparent;color:var(--teal);border:1px solid var(--teal)}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:310px;background:var(--panel);border-right:1px solid var(--border);padding:.7rem;overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:.7rem;overflow-y:auto}
.palanca{margin-bottom:.6rem}
.palanca label{display:flex;justify-content:space-between;font-size:.7rem;font-weight:600;color:var(--muted)}
.palanca input{width:100%;margin-top:.12rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:.5rem;margin-bottom:.6rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-card .label{font-size:.6rem;color:var(--muted);text-transform:uppercase}
.kpi-card .value{font-size:1.2rem;font-weight:800;margin:.1rem 0}
.kpi-card .sub{font-size:.55rem;color:var(--muted)}
.semaforo{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}
.semaforo.verde{background:#1d9e75;box-shadow:0 0 5px #1d9e75}
.semaforo.amarillo{background:#c9a84c;box-shadow:0 0 5px #c9a84c}
.semaforo.rojo{background:#e05252;box-shadow:0 0 5px #e05252}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem;flex-wrap:wrap}
.tab{padding:.3rem .7rem;border-radius:5px;cursor:pointer;font-size:.7rem;background:var(--panel);border:1px solid var(--border);color:var(--muted)}
.tab.active{background:var(--teal);color:#000;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
canvas{max-height:280px;margin-top:.3rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.board-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:.6rem;margin-bottom:.6rem}
.exec-hero{background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(0,168,157,.04));border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem}
.rec-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:.7rem .9rem;margin-bottom:.5rem}
.rec-box.warn{border-left-color:var(--warn)}
.rec-box.critical{border-left-color:var(--red)}
.rec-title{font-size:.72rem;font-weight:700;color:var(--teal);margin-bottom:.25rem}
.rec-desc{font-size:.65rem;color:var(--muted);line-height:1.5}
.rec-impact{font-size:.68rem;font-weight:700;color:var(--gold);margin-top:.3rem}
.data-table{width:100%;border-collapse:collapse;font-size:.66rem;margin-top:.3rem}
.data-table th{text-align:left;padding:.35rem .5rem;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
.data-table td{padding:.35rem .5rem;border-bottom:1px solid rgba(30,45,63,.5)}
.grafo-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.4rem;margin-top:.4rem;overflow:auto}
.grafo-container svg{width:100%;min-height:350px}
.bottleneck-alert{background:rgba(224,82,82,.06);border:1px solid rgba(224,82,82,.25);border-radius:6px;padding:.5rem .7rem;margin:.3rem 0;font-size:.65rem;color:var(--red)}
.marginal-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem}
.marginal-rank{width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.15);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.marginal-info{flex:1}
.marginal-name{font-size:.68rem;font-weight:700}
.marginal-desc{font-size:.6rem;color:var(--muted)}
.marginal-roi{text-align:right}
@media(max-width:900px){.sidebar{width:100%;max-height:30vh}.main{flex-direction:column}.chart-row,.board-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="diamond">◆</span> PRISMA <small style="color:var(--muted);font-size:.55rem">by GL Strategic</small></div>
  <span style="color:var(--muted);font-size:.65rem">Industria:</span>
  <select id="indSel"><option value="mineria">Minería</option><option value="clinica">Clínica</option><option value="hospital">Hospital</option><option value="acuicola" selected>Acuícola</option><option value="retail">Retail</option><option value="logistica">Logística</option><option value="telecom">Telecom</option><option value="agro">Agro</option><option value="energia">Energía</option></select>

  <button onclick="anchorBase()" class="secondary">📌 Anclar</button>

</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div style="margin-bottom:.5rem">
      <label style="font-size:.6rem;color:var(--muted);font-weight:700">Escenario:</label>
      <select id="scenarioSel" onchange="loadScn(this.value)" style="width:100%"><option value="">— Personalizado —</option></select>

  <div class="content">

<script>

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════

      {id:"precioUSD",label:"Precio USD",base:6.0,formato:"usd2"}, {id:"biomasa",label:"Biomasa (t)",base:11500,formato:"num"},
      {id:"ebitda",label:"EBITDA",base:0,formato:"usdM"}, {id:"ebitKg",label:"EBIT/kg",base:0.73,formato:"usd2"}
    ],
    cadenas:[
      {nombre:"FCR elevado",causa:"Alimentación ineficiente o desperdicio",impacto:"Costo alimento ↑ 0.5-0.8% por cada 0.01 de FCR",accion:"Optimizar alimentación con monitoreo digital. Cada 0.05 de mejora en FCR = +$0.88M EBITDA.",horizonte:"14-45 días",polaridad:"negativo"},
      {nombre:"Mortalidad por SRS/ambiental",causa:"SRS (75% muertes infecciosas) + blooms de algas/bajo oxígeno",impacto:"Biomasa ↓ 1% por cada punto de mortalidad",accion:"Reforzar vacunación SRS y monitoreo de oxígeno disuelto. Cada 1pp menos de mortalidad = +$0.56M EBITDA.",horizonte:"30-90 días",polaridad:"negativo"},
      {nombre:"Presión de Caligus",causa:"Infestación de piojos de mar amplificada por temperatura >14°C",impacto:"Costo sanitario ↑ + antibióticos. Chile usa 500x más antibióticos que Noruega.",accion:"Tratamiento coordinado por barrio. Cada 1 índice menos de Caligus = +$0.25M EBITDA.",horizonte:"7-30 días",polaridad:"negativo"},

      {nombre:"Eficiencia en planta",causa:"Mayor yield = más producto vendible por tonelada cosechada",impacto:"Cada 1pp de yield = +$0.63M EBITDA",accion:"Reducir merma en fileteado. Benchmark industria: 82-85%.",horizonte:"30-60 días",polaridad:"positivo"}

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
let industriaActual=null,perfilCliente={},estadoActual={},estadoBase={},chartInst=null,tornadoInst=null;
let currentIndustry='acuicola';

function obtenerFormula(ind){if(typeof ind.formulaPrincipal==='function')return ind.formulaPrincipal;try{return eval('('+ind.formulaPrincipal+')');}catch(e){return()=>({});}}
function simular(palancas){const f=obtenerFormula(industriaActual);const s={...(industriaActual.supuestos||{}),...perfilCliente};try{return f(palancas,s,CTX);}catch(e){return{};}}
function leerPalancas(){const p={};(industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{const sl=document.getElementById('sl-'+n.id);p[n.id]=sl?parseFloat(sl.value):(industriaActual.initState[n.id]||0);});return p;}
function actualizar(){estadoActual=simular(leerPalancas());renderAll();}

// ══════════════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════════════
function construirSidebar(){
  const c=document.getElementById('palancasContainer');c.innerHTML='';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').forEach(n=>{
    const init=industriaActual.initState[n.id]||0,min=init*0.5,max=init*1.5;
    const d=document.createElement('div');d.className='palanca';
    d.innerHTML=`<label><span>${n.icon||''} ${n.label}</span><span id="val-${n.id}" style="font-size:.65rem;color:var(--teal)">${init.toFixed(2)}</span></label><input type="range" id="sl-${n.id}" min="${min}" max="${max}" value="${init}" step="${(max-min)/200}"><div style="font-size:.5rem;color:var(--muted);margin-top:.1rem">${n.ref||''}</div>`;
    c.appendChild(d);
    document.getElementById('sl-'+n.id).addEventListener('input',()=>{const s=document.getElementById('sl-'+n.id),v=document.getElementById('val-'+n.id);if(s&&v)v.textContent=parseFloat(s.value).toFixed(2);actualizar();});
  });
  const sel=document.getElementById('scenarioSel');sel.innerHTML='<option value="">— Personalizado —</option>';
  (industriaActual.escenarios||[]).forEach((esc,i)=>{const o=document.createElement('option');o.value=i;o.textContent=esc.nombre;sel.appendChild(o);});
}

function poblarEmpresas(){
  const key=document.getElementById('indSel').value;currentIndustry=key;
  const sel=document.getElementById('empSel');sel.innerHTML='';
  (COMPANIES[key]||[]).forEach(c=>sel.appendChild(new Option(c.nombre,c.id)));
  if((COMPANIES[key]||[]).length>0)cargarEmpresa(COMPANIES[key][0].id);
}
function cargarEmpresa(id){
  const key=document.getElementById('indSel').value;
  const company=(COMPANIES[key]||[]).find(c=>c.id===id);
  if(!company)return;
  if(IND[key]){const ind=JSON.parse(JSON.stringify(IND[key]));if(typeof ind.formulaPrincipal==='string')ind.formulaPrincipal=eval('('+ind.formulaPrincipal+')');industriaActual=ind;}
  perfilCliente={...(company.perfil||{})};
  construirSidebar();
  Object.entries(company.perfil||{}).forEach(([k,v])=>{const sl=document.getElementById('sl-'+k);if(sl){sl.value=v;const vl=document.getElementById('val-'+k);if(vl)vl.textContent=v.toFixed(2);}});
  estadoBase=simular(leerPalancas());
  actualizar();
}
function loadScn(idx){if(!industriaActual||idx==='')return;const esc=industriaActual.escenarios[parseInt(idx)];if(!esc)return;Object.entries(esc.palancas).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}
function resetSliders(){if(!industriaActual)return;Object.entries(industriaActual.initState||{}).forEach(([id,val])=>{const sl=document.getElementById('sl-'+id);if(sl){sl.value=val;const vl=document.getElementById('val-'+id);if(vl)vl.textContent=val.toFixed(2);}});actualizar();}
function anchorBase(){estadoBase={...estadoActual};renderBoardroom();}

// ══════════════════════════════════════════════════════════════
// RENDERIZADORES
// ══════════════════════════════════════════════════════════════
function fmt(val,f){if(f==='usdM')return'$'+new Intl.NumberFormat('es-CL',{maximumFractionDigits:1}).format(val)+'M';if(f==='usd2')return'$'+val.toFixed(2);if(f==='pct')return val.toFixed(1)+'%';if(f==='num2')return val.toFixed(2);if(f==='num1')return val.toFixed(1);return new Intl.NumberFormat('es-CL',{maximumFractionDigits:0}).format(val);}

function renderKPIs(){
  const c=document.getElementById('kpiContainer');if(!industriaActual)return;c.innerHTML='';
  (industriaActual.kpis||[]).forEach(kpi=>{
    const val=estadoActual[kpi.id]!==undefined?estadoActual[kpi.id]:0;
    const base=kpi.base||0;const pct=base>0?(val-base)/Math.abs(base)*100:0;
    let sem='<span class="semaforo verde"></span>';
    if(pct<-15)sem='<span class="semaforo rojo"></span>';else if(pct<-5)sem='<span class="semaforo amarillo"></span>';
    const color=kpi.id.includes('ebitda')||kpi.id.includes('ingreso')?'gold':kpi.id.includes('costo')||kpi.id.includes('mort')?'red':'teal';
    const card=document.createElement('div');card.className='kpi-card';
    card.style.cssText='position:relative;overflow:hidden';
    card.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:2px;background:${pct<-10?'var(--red)':pct<0?'var(--warn)':'var(--teal)'}"></div><div class="label">${sem}${kpi.label}</div><div class="value" style="color:var(--${color})">${fmt(val,kpi.formato)}</div><div class="sub">${kpi.unidades||''}</div>`;
    c.appendChild(card);
  });
  renderCharts();
}

function renderCharts(){
  if(chartInst)chartInst.destroy();if(tornadoInst)tornadoInst.destroy();
  const c1=document.getElementById('impactChart'),c2=document.getElementById('tornadoChart');
  if(!c1||!c2||!industriaActual)return;
  const kpisNum=(industriaActual.kpis||[]).filter(k=>k.formato);
  chartInst=new Chart(c1.getContext('2d'),{type:'bar',data:{labels:kpisNum.map(k=>k.label),datasets:[{data:kpisNum.map(k=>estadoActual[k.id]||0),backgroundColor:kpisNum.map(k=>k.id.includes('ebitda')||k.id.includes('ingreso')?'rgba(201,168,76,.8)':'rgba(55,138,221,.7)'),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},title:{display:true,text:'KPIs Actuales',color:'#e2e9f3',font:{size:11}}},scales:{y:{ticks:{color:'#6b809b'}},x:{ticks:{color:'#6b809b',font:{size:9}}}}}});
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const impacts=drivers.map(d=>{const init=industriaActual.initState[d.id]||0,val=estadoActual[d.id]||init,elast=d.elasticidad||0;return{label:d.label,delta:elast>=0?Math.abs(elast)*3:-Math.abs(elast)*3}}).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  tornadoInst=new Chart(c2.getContext('2d'),{type:'bar',data:{labels:impacts.map(i=>i.label),datasets:[{data:impacts.map(i=>i.delta),backgroundColor:impacts.map(i=>i.delta>=0?'rgba(0,168,157,.7)':'rgba(224,82,82,.7)'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},title:{display:true,text:'Impacto Marginal (sensibilidad)',color:'#e2e9f3',font:{size:11}}},scales:{x:{ticks:{color:'#6b809b'}},y:{ticks:{color:'#6b809b',font:{size:9}}}}}});
}

function renderBoardroom(){
  const c=document.getElementById('boardroomContent');if(!industriaActual)return;
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const ordenados=drivers.map(d=>({label:d.label,init:industriaActual.initState[d.id]||0,val:estadoActual[d.id]||0,elast:d.elasticidad||0})).sort((a,b)=>Math.abs((b.val-b.init)/b.init*b.elast)-Math.abs((a.val-a.init)/a.init*a.elast));
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda'));
  const ebitda=kpiRes?estadoActual[kpiRes.id]||0:0;
  const ebitdaBase=estadoBase[kpiRes?.id]||ebitda;
  const delta=ebitda-ebitdaBase;
  let html='<div class="board-grid"><div><div class="exec-hero"><div style="font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem">Análisis Ejecutivo — '+industriaActual.nombre+'</div><div style="font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.25rem">EBITDA: <span style="color:var(--gold)">$'+ebitda.toFixed(1)+'M</span> | EBIT/kg: <span style="color:var(--teal)">$'+(estadoActual.ebitKg||0).toFixed(2)+'</span></div><div style="font-size:.7rem;color:var(--muted);line-height:1.5">';
  if(delta!==0)html+='Δ vs Base: <span style="color:'+(delta>=0?'var(--teal)':'var(--red)')+'">'+(delta>=0?'+':'')+delta.toFixed(2)+'M ('+(delta/ebitdaBase*100).toFixed(1)+'%)</span> | ';
  html+='Benchmark industria chilena: EBIT/kg $0.62-$0.84 (2025). Noruega: €2.00/kg.</div></div>';
  if(ordenados.length>0){
    const top=ordenados[0];const critico=ordenados.find(d=>d.elast<0&&d.val>d.init*1.2);
    html+='<div class="rec-box"><div class="rec-title">🔍 Palanca de Mayor Impacto: '+top.label+'</div><div class="rec-desc">Una variación de ±1% en <strong>'+top.label+'</strong> impacta el EBITDA en aproximadamente <strong>$'+(Math.abs(top.elast)*0.4).toFixed(2)+'M</strong>. ';
    const cadena=industriaActual.cadenas.find(c=>c.nombre.includes(top.label));if(cadena)html+=cadena.accion;
    html+='</div></div>';
    if(critico)html+='<div class="bottleneck-alert">⚠️ <strong>Alerta:</strong> '+critico.label+' supera en '+((critico.val/critico.init-1)*100).toFixed(0)+'% su valor de referencia. Revise el Plan de Acción.</div>';
  }
  html+='</div><div style="display:flex;flex-direction:column;gap:.4rem"><div class="rec-box warn"><div class="rec-title">📊 Contexto Industria</div><div class="rec-desc">Chile: 2° productor mundial (31%). Exportaciones 2024: <strong>$6.37B</strong>. 5 empresas concentran 56% de exportaciones. Q1 2026: +20.7% volumen vs 2025.</div></div>';
  html+='<div class="rec-box"><div class="rec-title">⚡ Eficiencia Operacional</div><div class="rec-desc">Costo total: $3.89-$4.82/kg WFE. Feed = 50-60% del costo. FCR objetivo: <1.25. Yield objetivo: >84%.</div></div></div></div>';
  c.innerHTML=html;
}

function renderPlan(){
  const c=document.getElementById('planContent');if(!industriaActual)return;
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  const ordenados=drivers.map(d=>{
    const init=industriaActual.initState[d.id]||0,val=estadoActual[d.id]||0,elast=Math.abs(d.elasticidad||0);
    const marginal=elast*0.8;const roi=marginal*12;
    const cadena=industriaActual.cadenas.find(c=>c.nombre.includes(d.label));
    return{label:d.label,init,val,elast,marginal,roi,accion:cadena?.accion||'',horizonte:cadena?.horizonte||''};
  }).sort((a,b)=>b.marginal-a.marginal);
  let html='<h3 style="color:var(--gold);margin-bottom:.5rem">🎯 Plan de Acción — Priorizado por Impacto Marginal</h3>';
  ordenados.slice(0,6).forEach((d,i)=>{
    html+=`<div class="marginal-item"><div class="marginal-rank">${i+1}</div><div class="marginal-info"><div class="marginal-name">${d.label}</div><div class="marginal-desc">Actual: ${d.val.toFixed(2)} | Base: ${d.init.toFixed(2)} | Elasticidad: ${d.elast.toFixed(2)}</div></div><div class="marginal-roi"><div style="font-size:.75rem;font-weight:800;color:var(--gold)">+$${d.marginal.toFixed(2)}M</div><div style="font-size:.55rem;color:var(--muted)">${d.horizonte||'—'}</div></div></div>`;
    if(d.accion)html+=`<div style="font-size:.6rem;color:var(--teal);margin:-.1rem 0 .3rem 2rem;line-height:1.4">→ ${d.accion}</div>`;
  });
  c.innerHTML=html;
}

function renderGrafo(){
  const c=document.getElementById('grafoContainer');if(!industriaActual||!industriaActual.nodos){c.innerHTML='';return;}
  const nodos=industriaActual.nodos;const colX={driver:25,intermedio:310,resultado:600};
  const colColor={driver:{stroke:'#3a7bd5',glow:'#3a7bd5',label:'#3a7bd5'},intermedio:{stroke:'#f0a04b',glow:'#f0a04b',label:'#f0a04b'},resultado:{stroke:'#c9a84c',glow:'#c9a84c',label:'#c9a84c'}};
  let svg='<svg viewBox="0 0 820 380"><defs>';
  ['driver','intermedio','resultado'].forEach(tipo=>{const cl=colColor[tipo];svg+=`<filter id="glow_${tipo}" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feFlood flood-color="${cl.glow}" flood-opacity="0.2"/><feComposite in2="blur" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;});
  svg+='<marker id="arrowPos" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#06d6a0"/></marker><marker id="arrowNeg" markerWidth="10" markerHeight="8" refX="9" refY="4"><path d="M0,0 L10,4 L0,8 Z" fill="#e05252"/></marker></defs>';
  const pos={};
  ['driver','intermedio','resultado'].forEach(tipo=>{
    const arr=nodos.filter(n=>n.tipo===tipo);const cl=colColor[tipo];
    arr.forEach((n,i)=>{
      const y=45+i*95,x=colX[tipo],w=150,h=75;pos[n.id]={x:x+w/2,y:y+h/2,x1:x,y1:y,w,h};
      const val=estadoActual[n.id]!==undefined?estadoActual[n.id]:'-';
      const base=industriaActual.initState[n.id]||val;const pct=typeof val==='number'&&typeof base==='number'&&base!==0?(val-base)/Math.abs(base)*100:0;
      const trendColor=pct>2?'#e05252':pct<-2?'#1d9e75':'#6b809b';
      const valStr=typeof val==='number'?(val>=1000?new Intl.NumberFormat('es-CL',{maximumFractionDigits:0}).format(val):val.toFixed(2)):val;
      const trendStr=pct!==0?' '+(pct>0?'↑':'↓')+Math.abs(pct).toFixed(0)+'%':'';
      svg+=`<g filter="url(#glow_${tipo})"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="#111922" stroke="${cl.stroke}" stroke-width="1.5"/><rect x="${x+2}" y="${y+2}" width="${w-4}" height="3" rx="1.5" fill="${cl.stroke}" opacity="0.6"/><text x="${x+12}" y="${y+26}" font-size="15">${n.icon||'📌'}</text><text x="${x+34}" y="${y+26}" font-size="11" font-weight="600" fill="${cl.label}">${n.label}</text><text x="${x+12}" y="${y+52}" font-size="15" font-weight="700" fill="#e2e9f3" font-family="'Space Mono',monospace">${valStr}</text><text x="${x+12}" y="${y+68}" font-size="10" fill="${trendColor}">${n.unidades||''}${trendStr}</text></g>`;
    });
  });
  (industriaActual.arcos||[]).forEach(a=>{const o=pos[a.origen],d=pos[a.destino];if(!o||!d)return;const color=a.polaridad==='positivo'?'#06d6a0':'#e05252';const marker=a.polaridad==='positivo'?'url(#arrowPos)':'url(#arrowNeg)';const mx=(o.x+d.x)/2;svg+=`<path d="M${o.x1+o.w},${o.y} C${mx},${o.y} ${mx},${d.y} ${d.x1},${d.y}" stroke="${color}" stroke-width="2" fill="none" marker-end="${marker}" opacity="0.7"/>`;});
  svg+='</svg>';c.innerHTML=svg;
}

function renderEscenarios(){
  const c=document.getElementById('escenariosContent');if(!industriaActual)return;
  const kpiRes=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda'));
  let html='<h3 style="color:var(--gold);margin-bottom:.5rem">📋 Comparativa de Escenarios</h3><table class="data-table"><thead><tr><th>Escenario</th>';
  (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<th>${d.label}</th>`);
  if(kpiRes)html+=`<th>${kpiRes.label}</th><th>EBIT/kg</th>`;
  html+='</tr></thead><tbody>';
  (industriaActual.escenarios||[]).forEach(esc=>{
    html+=`<tr><td style="font-weight:700;color:var(--gold)">${esc.nombre}</td>`;
    (industriaActual.nodos||[]).filter(n=>n.tipo==='driver').slice(0,4).forEach(d=>html+=`<td>${esc.palancas[d.id]||'-'}</td>`);
    if(kpiRes){const sup={...(industriaActual.supuestos||{}),...perfilCliente};try{const f=obtenerFormula(industriaActual);const r=f(esc.palancas,sup,CTX);html+=`<td style="font-weight:700;color:${(r[kpiRes.id]||0)>(estadoActual[kpiRes.id]||0)?'var(--teal)':'var(--red)'}">$${r[kpiRes.id]?.toFixed(1)||'—'}M</td><td>$${r.ebitKg?.toFixed(2)||'—'}</td>`;}catch(e){html+='<td>—</td><td>—</td>';}}
    html+='</tr>';
  });
  html+='</tbody></table>';
  c.innerHTML=html;
}

function renderEvidencia(){
  const c=document.getElementById('evidenciaContent');if(!industriaActual)return;
  let html='<h3 style="color:var(--gold);margin-bottom:.5rem">📊 Calidad de Datos y Fuentes</h3><div class="rec-box"><div class="rec-title">⚠️ Datos Demo — Requieren Calibración</div><div class="rec-desc">Los valores mostrados son benchmarks sectoriales basados en fuentes públicas. No constituyen diagnóstico real. Para uso decisional, calibrar con datos propios de la empresa.</div></div><table class="data-table"><thead><tr><th>Variable</th><th>Valor Demo</th><th>Rango Industria</th><th>Fuente</th><th>Calidad</th></tr></thead><tbody>';
  const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');
  drivers.forEach(d=>{
    const init=industriaActual.initState[d.id]||0;
    const calidad=d.elasticidad&&Math.abs(d.elasticidad)>0.7?'●●●○ Media-Alta':'●●○○ Media';
    html+=`<tr><td>${d.label}</td><td>${init} ${d.unidades||''}</td><td>${d.ref||'—'}</td><td class="td-mono">${d.ref?.includes('Sernapesca')?'Sernapesca':d.ref?.includes('Camanchaca')?'Reportes financieros':'Benchmark sectorial'}</td><td>${calidad}</td></tr>`;
  });
  html+='</tbody></table>';
  html+='<div style="font-size:.6rem;color:var(--muted);margin-top:.5rem;line-height:1.5"><strong>Fuentes recomendadas para calibración:</strong> Sernapesca (mortalidad, caligus), Banco Central (FX), Aduanas Chile (precios exportación), Consejo del Salmón (estadísticas cosecha), SalmonChile (producción nacional), reportes financieros empresas abiertas (Mowi, SalMar, Blumar, Camanchaca, Multi X).</div>';
  c.innerHTML=html;
}

function runMC(){
  if(!industriaActual)return;const drivers=(industriaActual.nodos||[]).filter(n=>n.tipo==='driver');const res=[];for(let i=0;i<500;i++){const pal={};drivers.forEach(n=>{const base=estadoActual[n.id]||industriaActual.initState[n.id]||0;pal[n.id]=base*(0.8+Math.random()*0.4);});const r=simular(pal);const kr=(industriaActual.kpis||[]).find(k=>k.id.includes('ebitda'));if(kr)res.push(r[kr.id]||0);}
  if(!res.length)return;const sorted=[...res].sort((a,b)=>a-b);const p10=sorted[Math.floor(500*.1)],p50=sorted[Math.floor(500*.5)],p90=sorted[Math.floor(500*.9)];const bins={};res.forEach(v=>{const k=Math.round(v);bins[k]=(bins[k]||0)+1;});const labels=Object.keys(bins).sort((a,b)=>a-b),data=labels.map(l=>bins[l]);
  if(chartInst)chartInst.destroy();const canvas=document.getElementById('impactChart');
  chartInst=new Chart(canvas.getContext('2d'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#c9a84c',borderRadius:3}]},options:{responsive:true,plugins:{title:{display:true,text:`Montecarlo — P10: $${p10.toFixed(1)}M | P50: $${p50.toFixed(1)}M | P90: $${p90.toFixed(1)}M`,color:'#e2e9f3',font:{size:10}},legend:{display:false}},scales:{y:{ticks:{color:'#6b809b'}},x:{ticks:{color:'#6b809b',font:{size:8}}}}}});
}

function renderAll(){renderKPIs();renderBoardroom();renderPlan();renderGrafo();renderEscenarios();renderEvidencia();}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const map={kpis:'tab-kpis',boardroom:'tab-boardroom',plan:'tab-plan',grafo:'tab-grafo',escenarios:'tab-escenarios',evidencia:'tab-evidencia'};
  document.getElementById(map[tab]).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>{if(Object.keys(map)[i]===tab)t.classList.add('active');});
  if(tab==='grafo')renderGrafo();if(tab==='escenarios')renderEscenarios();if(tab==='evidencia')renderEvidencia();if(tab==='boardroom')renderBoardroom();if(tab==='plan')renderPlan();
}

document.getElementById('indSel').addEventListener('change',poblarEmpresas);
document.getElementById('empSel').addEventListener('change',function(){cargarEmpresa(this.value);});
window.addEventListener('load',()=>{poblarEmpresas();});
</script>
